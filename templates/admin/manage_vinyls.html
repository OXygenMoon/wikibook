{% extends "base.html" %}
{% block title %}唱片压制厂 - 管理域{% endblock %}

{% block extra_css %}
<style>
    .brutal-card { background: #fff; border: 2px solid #111; box-shadow: 6px 6px 0 #111; border-radius: 2px; }
    .terminal-input { background: #fff; border: 1px solid #111; padding: 0.5rem; font-family: monospace; width: 100%; font-weight: bold; }
    .terminal-input:focus { outline: none; box-shadow: 2px 2px 0 #111; }
    .btn-brutal { background: #111; color: #fff; padding: 0.5rem 1rem; border: 1px solid #111; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    .btn-brutal:hover { background: #ea580c; border-color: #ea580c; }
    html.dark .brutal-card { background: #1a1a1a; border-color: rgba(255,255,255,0.2); box-shadow: 4px 4px 0 rgba(255,255,255,0.16); }
    html.dark .terminal-input { background: #131313; border-color: rgba(255,255,255,0.24); color: #e5e7eb; }
    html.dark .terminal-input:focus { box-shadow: 0 0 0 2px rgba(255,255,255,0.12); }
</style>
{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto pt-10 pb-20 px-4">
    <h1 class="text-3xl font-black uppercase tracking-widest mb-8 border-b-4 border-[#111] dark:border-white/20 pb-2"><i class="fas fa-record-vinyl mr-2"></i> 赛博唱片压制厂</h1>

    <div class="brutal-card p-6 mb-10 bg-[#fafafa] stripe-pattern">
        <h3 class="font-black text-lg mb-4 uppercase">压制新频段 (New Vinyl)</h3>
        <form method="POST" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white dark:bg-base-200 p-4 border border-[#111] dark:border-white/20">
            <div>
                <label class="block text-[10px] font-black uppercase mb-1">频段代号 (Title)</label>
                <input type="text" name="name" class="terminal-input" required placeholder="如：Rain in Cyberpunk City">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase mb-1">解锁条件 (Unlock Condition)</label>
                <select name="condition_type" class="terminal-input">
                    <option value="all_users">全员派发 (直接解锁)</option>
                    <option value="study_hours">累计专注时长 (小时)</option>
                    <option value="pomo_count">累计番茄次数 (次)</option>
                    <option value="streak_days">连续打卡 (天)</option>
                    <option value="note_count">产出公开笔记 (篇)</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase mb-1">条件阈值 (Value) <span class="text-red-500 font-normal">全员派发填0</span></label>
                <input type="number" name="condition_value" class="terminal-input" value="0" required>
            </div>
            <div class="col-span-full border-t border-dashed border-[#ccc] pt-4 mt-2"></div>
            <div>
                <label class="block text-[10px] font-black uppercase mb-1 text-primary">📀 上传圆形封面图 (.png/.jpg)</label>
                <input type="file" name="cover_file" accept="image/*" class="terminal-input" required>
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase mb-1 text-primary">🔊 上传白噪声文件 (.mp3/.wav)</label>
                <input type="file" name="audio_file" accept="audio/*" class="terminal-input" required>
            </div>
            <div class="col-span-full mt-2">
                <button type="submit" class="btn-brutal w-full text-lg py-3"><i class="fas fa-hammer mr-2"></i> 开始压制并写入数据库</button>
            </div>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for v in vinyls %}
        <div class="brutal-card p-4 flex flex-col items-center relative overflow-hidden">
            <div class="w-24 h-24 rounded-full border-4 border-[#111] overflow-hidden mb-3 animate-spin-slow" style="animation: spin 10s linear infinite;">
                <img src="{{ v.cover_url }}" class="w-full h-full object-cover">
            </div>
            <h4 class="font-black text-[#111] dark:text-stone-100 text-center leading-tight mb-2">{{ v.name }}</h4>
            <div class="text-[9px] font-mono bg-stone-200 dark:bg-base-300 text-[#111] dark:text-stone-200 px-2 py-1 uppercase">{{ condition_map.get(v.condition_type) }}: {{ v.condition_value }}</div>
            <div class="mt-4 flex gap-2 w-full">
                <audio controls src="{{ v.audio_url }}" class="h-8 w-full"></audio>
                <form method="POST" action="{{ url_for('delete_vinyl', v_id=v.id) }}" onsubmit="return confirm('确定销毁这张唱片吗？')" class="m-0">
                    <button class="h-8 px-3 bg-red-500 text-white font-bold border border-[#111] hover:bg-red-600"><i class="fas fa-trash"></i></button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
{% endblock %}

{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/github.min.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/easymde.min.css') }}">

<style>
    /* 💡 强制编辑器内部滚动，并美化滚动条 */
    .EasyMDEContainer .CodeMirror {
        height: auto;
        max-height: 60vh; 
    }
    .EasyMDEContainer .CodeMirror-scroll {
        max-height: 60vh;
        overflow-y: auto !important;
        overflow-x: hidden;
    }

    /* =========================================
       💡 强行拍平左侧源码区的富文本效果，还原纯代码视觉
       ========================================= */
    .EasyMDEContainer .CodeMirror .cm-header-1,
    .EasyMDEContainer .CodeMirror .cm-header-2,
    .EasyMDEContainer .CodeMirror .cm-header-3,
    .EasyMDEContainer .CodeMirror .cm-header-4,
    .EasyMDEContainer .CodeMirror .cm-header-5,
    .EasyMDEContainer .CodeMirror .cm-header-6 {
        font-size: 1em !important; 
        font-weight: normal !important;
        line-height: inherit !important;
    }

    .EasyMDEContainer .CodeMirror .cm-formatting-strong,
    .EasyMDEContainer .CodeMirror .cm-strong {
        font-weight: normal !important;
    }

    .EasyMDEContainer .CodeMirror .cm-formatting-em,
    .EasyMDEContainer .CodeMirror .cm-em {
        font-style: normal !important;
    }

    /* =========================================
       分屏预览区 (Side by Side) 基础样式调整
       ========================================= */
    .editor-preview-side {
        border: none !important;
        border-left: 1px solid hsl(var(--bc) / 0.1) !important;
        background-color: hsl(var(--b1));
        position: absolute;
        bottom: 0;
        right: 0;
        top: 50px; 
        overflow-y: auto !important;
        height: auto !important; 
        z-index: 50;
        padding: 2rem !important; 
    }

    .EasyMDEContainer.sided--no-fullscreen .CodeMirror { width: 50% !important; }
    .EasyMDEContainer.sided--no-fullscreen .editor-preview-side {
        width: 50% !important;
        top: 52px !important;
        display: block !important;
        height: calc(100% - 52px) !important;
    }

    /* =========================================
       分屏预览区 (Side by Side) 核心布局修复
       ========================================= */
       
    /* 1. 锁死分屏状态下外层总容器的高度 */
    .EasyMDEContainer.sided--no-fullscreen {
        position: relative;
        height: 70vh !important; /* 💡 锁死总高度，你可以根据喜好调整为 60vh 或 80vh */
        min-height: 500px;
    }

    /* 2. 左侧源码区：严格继承容器高度 */
    .EasyMDEContainer.sided--no-fullscreen .CodeMirror {
        width: 50% !important;
        height: calc(100% - 52px) !important; /* 减去顶部工具栏的大致高度 */
        max-height: none !important; /* 清除之前的 max-height 干扰 */
    }

    /* 3. 右侧预览区：绝对定位，严禁高度溢出，强制内部滚动 */
    .EasyMDEContainer.sided--no-fullscreen .editor-preview-side {
        display: block !important;
        position: absolute !important;
        top: 52px !important; /* 避开工具栏 */
        right: 0 !important;
        width: 50% !important;
        height: calc(100% - 52px) !important; /* 💡 关键：高度严格限制，和左侧对齐 */
        border: none !important;
        border-left: 1px solid hsl(var(--bc) / 0.1) !important;
        background-color: hsl(var(--b1));
        overflow-y: auto !important; /* 💡 强制内部出现滚动条 */
        z-index: 50;
        padding: 2rem !important; 
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto card bg-base-100 shadow">
  <div class="card-body">
    <h2 class="card-title">编辑页面</h2>
    <form method="post" class="flex flex-col gap-4">
      <div class="flex gap-4">
          <input class="input input-bordered flex-1" name="title" value="{{ page.title }}" placeholder="标题" required>
          <input class="input input-bordered flex-1" name="slug" value="{{ page.slug }}" type="number" step="1" placeholder="标识（整数，负数置顶）" required>
      </div>
      <input class="input input-bordered w-full" name="tags" value="{{ page.tags | map(attribute='name') | join(', ') }}" placeholder="标签 (用逗号分隔)">
      
      <div class="form-control">
        <label class="label cursor-pointer justify-start gap-4">
          <span class="label-text">允许评论</span> 
          <input type="checkbox" name="comment_enabled" class="toggle toggle-primary" {% if page.comment_enabled %}checked{% endif %} />
        </label>
      </div>

      <textarea id="md-editor" name="content_md" placeholder="Markdown内容">{{ page.content_md }}</textarea>
      
      <div class="flex justify-between items-center mt-4">
          <button class="btn btn-primary px-8" type="submit">保存修改</button>
          <button type="button" class="btn btn-error btn-outline" onclick="delete_modal.showModal()">删除页面</button>
      </div>
    </form>
    
    <div class="mt-4">
      <a class="btn btn-ghost" href="{{ url_for('view_page', wiki_id=wiki.id, slug=page.slug) }}">返回阅读</a>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<dialog id="delete_modal" class="modal">
  <div class="modal-box">
    <h3 class="font-bold text-lg text-error">确认删除</h3>
    <p class="py-4">您确定要删除页面 "<strong>{{ page.title }}</strong>" 吗？此操作无法撤销。</p>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn">取消</button>
      </form>
      <form action="{{ url_for('delete_page', wiki_id=wiki.id, slug=page.slug) }}" method="post">
        <button class="btn btn-error">确认删除</button>
      </form>
    </div>
  </div>
</dialog>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/vendor/polyfill.min.js') }}"></script>
<script id="MathJax-script" async src="{{ url_for('static', filename='js/vendor/tex-mml-chtml.js') }}"></script>
<script src="{{ url_for('static', filename='js/vendor/highlight.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/vendor/easymde.min.js') }}"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
      if (window.hljs) hljs.highlightAll();
  });

  const easyMDE = new EasyMDE({
    element: document.getElementById('md-editor'),
    spellChecker: false,
    minHeight: "400px",
    maxHeight: "60vh",
    
    // 💡 允许分屏与同步滚动
    sideBySideFullscreen: false, 
    syncSideBySidePreviewScroll: false,
    toolbar: [
        "bold", "italic", "strikethrough", "heading", "|", 
        "quote", "unordered-list", "ordered-list", "|", 
        "link", "image", "upload-image", "code", "|",  
        "preview", "side-by-side", "fullscreen", "|", 
        "guide"
    ],

    uploadImage: true,
    imageUploadEndpoint: "{{ url_for('upload_file') }}",
    imagePathAbsolute: true,
    imageCSRFToken: "", // 如果使用了CSRF保护，请在此处填入token
    imageMaxSize: 1024 * 1024 * 16, // 16MB
    imageAccept: "image/png, image/jpeg, image/gif, image/webp",
    imageTexts: {
        sbInit: "拖拽图片到这里或点击上传",
        sbOnDragEnter: "松开上传",
        sbOnDragLeave: "拖拽图片到这里或点击上传",
        sbProgress: "上传中...",
        sbOnUploaded: "上传成功",
        sizeUnits: "b,kb,mb"
    },
    errorCallback: function(errorMessage) {
        if(window.app && window.app.toast) {
            app.toast.show("上传失败: " + errorMessage, "error");
        } else {
            alert("上传失败: " + errorMessage);
        }
    },

    // 💡 核心：正确使用内置解析器并处理代码高亮与公式
    previewRender: function(plainText, preview) {
        setTimeout(() => {
            if (window.hljs) preview.querySelectorAll('pre code').forEach((b) => hljs.highlightElement(b));
            if (typeof MathJax !== 'undefined') MathJax.typesetPromise([preview]);
        }, 0);
        return this.parent.markdown(plainText); 
    }
  });

  // 💡 核心：加载后自动开启分屏，并给预览区注入 Markdown 排版样式
  setTimeout(function() {
      // 仅在大屏幕下自动开启分屏，避免手机端排版挤压
      if (!easyMDE.isSideBySideActive() && window.innerWidth > 1024) {
          easyMDE.toggleSideBySide();
      }
      if(easyMDE.codemirror) easyMDE.codemirror.refresh();

      // 为侧边预览框注入全局的 Markdown 排版样式
      const previewElement = document.querySelector('.editor-preview-side');
      if (previewElement) {
          previewElement.classList.add('markdown-body', 'prose', 'prose-stone', 'max-w-none', 'p-6');
      }
  }, 300);
</script>
{% endblock %}

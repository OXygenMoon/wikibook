{% extends "base.html" %}

{% block title %}{{ user.username }} 的成就册{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* --- 1. 全局与基础样式 --- */
    :root {
        --primary-warm: #f59e0b;
        --bg-warm: #fffbeb;
    }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 动画定义 */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes gradient-flow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes progress { 
        0% { stroke-dasharray: 0 100; } 
    }

    /* --- 2. 列表项样式 --- */
    .badge-list-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        background: #ffffff;
        border-radius: 1rem;
        border: 1px solid #f3f4f6;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
    }
    
    .badge-list-item:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }
    
    .badge-list-item:active {
        transform: scale(0.98);
    }

    .badge-list-item.locked {
        opacity: 0.7;
        background: #fafaf9;
    }
    .badge-list-item.locked .badge-icon-wrapper {
        filter: grayscale(100%) contrast(0.8);
        opacity: 0.6;
    }

    .badge-icon-wrapper {
        width: 4rem; height: 4rem;
        flex-shrink: 0;
        border-radius: 1rem;
        display: flex; align-items: center; justify-content: center;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    /* --- 3. 稀有度视觉系统 (修复了原代码未应用的问题) --- */
    
    /* 稀有度标签基础 */
    .rarity-badge {
        font-size: 0.65rem;
        padding: 2px 8px;
        border-radius: 99px;
        color: white;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        background-size: 200% 200%;
        animation: gradient-flow 4s ease infinite;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        display: inline-block;
        margin-left: 8px;
        vertical-align: middle;
    }

    /* 普通 (Common) */
    .rarity-common .rarity-badge {
        background-image: linear-gradient(135deg, #94a3b8, #64748b);
    }
    /* 列表项边框颜色 - 仅在解锁时显示 */
    .badge-list-item.unlocked.rarity-common { border-left: 4px solid #cbd5e1; }

    /* 稀有 (Rare) */
    .rarity-rare .rarity-badge {
        background-image: linear-gradient(135deg, #3b82f6, #2563eb);
    }
    .badge-list-item.unlocked.rarity-rare { 
        border-left: 4px solid #3b82f6;
        box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
    }

    /* 史诗 (Epic) */
    .rarity-epic .rarity-badge {
        background-image: linear-gradient(135deg, #d946ef, #7e22ce);
    }
    .badge-list-item.unlocked.rarity-epic { 
        border-left: 4px solid #d946ef;
        background: linear-gradient(to right, #fdf4ff, #fff);
    }

    /* 传说 (Legendary) */
    .rarity-legendary .rarity-badge {
        background-image: linear-gradient(135deg, #f59e0b, #d97706, #fbbf24);
        animation: gradient-flow 2s linear infinite;
    }
    .badge-list-item.unlocked.rarity-legendary { 
        border: 1px solid #fcd34d;
        border-left: 4px solid #f59e0b;
        background: linear-gradient(to right, #fffbeb, #fff);
        box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.15);
    }

    /* --- 4. 详情页模态框 --- */
    #badge-modal .modal-box {
        max-width: 100%;
        width: 100%;
        height: 100%;
        max-height: 100%;
        border-radius: 0;
        background: #ffffff;
        padding: 0;
        display: flex;
        flex-direction: column; /* 修复了原代码的 flex-col: column */
        overflow-y: auto;
    }
    
    @media (min-width: 640px) {
        #badge-modal .modal-box {
            max-width: 420px;
            height: auto;
            max-height: 85vh;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
    }

    .sticker-hero-container {
        flex: 1;
        min-height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #fdfbf7 0%, #fff 70%);
        position: relative;
    }

    .sticker-img-large {
        filter: drop-shadow(0 8px 16px rgba(0,0,0,0.1));
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .sticker-img-large:hover {
        transform: scale(1.1) rotate(3deg);
    }

    .sticker-info-section {
        padding: 1.5rem 2rem 2rem;
        background: #fff;
        position: relative;
        z-index: 10;
    }
    
    /* 底部元数据网格 */
    .meta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 1rem;
        border-top: 1px solid #f3f4f6;
        padding-top: 1.5rem;
        margin-top: 1.5rem;
    }
    
    .meta-item {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
    }
    
    .meta-label { font-size: 0.75rem; color: #9ca3af; font-weight: 500; }
    .meta-value { font-size: 0.875rem; color: #1f2937; font-weight: 700; font-family: ui-monospace, SFMono-Regular, monospace; }

    /* 分享按钮 */
    .share-btn-large {
        width: 100%;
        background-color: #0ea5e9;
        color: white;
        border-radius: 16px;
        padding: 1rem;
        font-weight: 600;
        font-size: 1rem;
        border: none;
        margin-top: 1.5rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
    }
    .share-btn-large:hover { background-color: #0284c7; transform: translateY(-1px); }
    .share-btn-large:active { transform: translateY(1px); }

    /* 关闭按钮 */
    .close-btn-round {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        background: rgba(255,255,255,0.8);
        backdrop-filter: blur(4px);
        color: #4b5563;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 50;
        transition: all 0.2s;
        border: 1px solid rgba(0,0,0,0.05);
        font-size: 1.2rem;
    }
    .close-btn-round:hover { background: #fff; transform: rotate(90deg); }

    /* 之前遗漏在 style 标签外的样式修复 */
    .circular-chart { display: block; margin: 0 auto; max-width: 100%; max-height: 250px; }
    .circle-bg { fill: none; stroke: #fed7aa; stroke-width: 3.8; } 
    .circle { 
        fill: none; 
        stroke-width: 2.8; 
        stroke-linecap: round; 
        transition: stroke-dasharray 1s ease-out; /* 使用 transition 代替 animation 以便动态更新 */
    }
</style>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
{% endblock %}

{% block content %}
<div id="achievement-book-container" class="max-w-[1400px] mx-auto px-4 sm:px-6 py-8 min-h-screen bg-[#fdfcf8]">
    
    <div class="bg-white rounded-3xl shadow-sm border border-orange-100 p-6 md:p-8 mb-8 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-80 h-80 bg-orange-50 rounded-full blur-3xl opacity-60 -mr-20 -mt-20 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-64 h-64 bg-amber-50 rounded-full blur-3xl opacity-60 -ml-16 -mb-16 pointer-events-none"></div>

        <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
            <div class="flex items-start gap-5 w-full md:w-auto">
                <a href="{{ url_for('public_profile', user_id=user.id) }}" class="btn btn-circle btn-ghost bg-stone-50 hover:bg-orange-100 text-stone-500 hover:text-orange-600 transition-all border-none">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-stone-800 tracking-tight flex items-center gap-3 flex-wrap">
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-orange-500">成就图鉴</span>
                        <span class="text-xs bg-orange-100 text-orange-700 px-3 py-1 rounded-full font-bold align-top mt-1 border border-orange-200 shadow-sm">
                            共 <span id="total-badge-count">0</span> 枚
                        </span>
                    </h1>
                    <p class="text-stone-500 mt-3 text-sm md:text-base max-w-lg font-medium leading-relaxed">
                        记录每一个闪光时刻。收集徽章，点亮属于你的荣誉星空。
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-6 bg-white/80 backdrop-blur-md p-4 pr-8 rounded-2xl border border-orange-100 shadow-sm">
                <div class="relative w-16 h-16">
                    <svg viewBox="0 0 36 36" class="circular-chart text-amber-500 transform -rotate-90">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" id="progress-circle" stroke="currentColor" />
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center text-[11px] font-bold text-amber-600">
                        <span id="completion-rate">0%</span>
                    </div>
                </div>
                <div>
                    <div class="text-[10px] text-stone-400 uppercase font-bold tracking-wider mb-1">当前进度</div>
                    <div class="text-2xl font-black text-stone-800 leading-none">
                        <span id="unlocked-count" class="text-amber-600">0</span>
                        <span class="text-stone-300 text-lg font-normal mx-0.5">/</span>
                        <span id="total-count" class="text-stone-400 text-lg font-normal">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="sticky top-2 z-30 bg-[#fdfcf8]/95 backdrop-blur-md py-3 -mx-4 px-4 md:mx-0 md:px-0 mb-6 rounded-xl md:static md:bg-transparent md:backdrop-blur-none transition-all">
        <div class="flex justify-start md:justify-center overflow-x-auto hide-scrollbar pb-2 md:pb-0">
            <div class="bg-white p-1.5 rounded-2xl shadow-sm border border-stone-100 flex gap-1" id="category-tabs">
                </div>
        </div>
    </div>

    <div class="flex justify-between items-end mb-4 px-2 max-w-3xl mx-auto w-full">
        <h2 class="text-lg font-bold text-stone-700 flex items-center gap-2">
            <i class="fas fa-layer-group text-stone-400 text-sm"></i> 贴纸库
        </h2>
        <span class="text-xs text-stone-400 font-medium bg-white px-2 py-1 rounded-md border border-stone-100 shadow-sm">
            显示 <span id="list-display-count" class="text-stone-600 font-bold">0</span> 张
        </span>
    </div>

    <div id="achievements-list" class="flex flex-col gap-3 pb-20 max-w-3xl mx-auto">
        </div>
    
    <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-center">
        <div class="w-24 h-24 bg-stone-50 rounded-full flex items-center justify-center mb-4 text-stone-200 text-4xl border border-stone-100">
            <i class="fas fa-search"></i>
        </div>
        <h3 class="text-lg font-bold text-stone-600">没有找到相关成就</h3>
        <p class="text-stone-400 text-sm mt-1">尝试切换其他分类看看吧</p>
    </div>
</div>

<dialog id="badge-modal" class="modal modal-bottom sm:modal-middle backdrop-blur-sm">
    <div class="modal-box hide-scrollbar">
        <form method="dialog">
            <button class="close-btn-round">✕</button>
        </form>

        <div id="share-capture-area" class="flex flex-col h-full bg-white">
            <div class="sticker-hero-container">
                <div id="modal-sticker-img-container" class="transition-all duration-500">
                    </div>
            </div>

            <div class="sticker-info-section">
                <div class="text-center mb-6">
                    <div class="flex justify-center items-center gap-2 mb-3">
                        <h3 class="font-900 text-2xl text-stone-800 tracking-tight" id="modal-title"></h3>
                        <span id="modal-rarity-tag"></span>
                    </div>
                    <p class="text-stone-500 text-sm leading-relaxed px-2 font-medium" id="modal-desc"></p>
                </div>

                <div class="meta-grid">
                    <div class="meta-item border-r border-stone-100 pr-4">
                        <span class="meta-label">发行方</span>
                        <span class="meta-value truncate" id="modal-issuer">WikiBook</span>
                    </div>
                    <div class="meta-item border-r border-stone-100 px-4">
                        <span class="meta-label">收集日期</span>
                        <span class="meta-value" id="modal-date">--.--.--</span>
                    </div>
                    <div class="meta-item pl-4 text-right">
                        <span class="meta-label">序列号</span>
                        <span class="meta-value font-mono text-stone-400" id="modal-serial">--</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="px-8 pb-8 bg-white">
            <button onclick="generateShareCard()" class="share-btn-large" id="share-btn">
                <i class="fas fa-share-nodes mr-2"></i>保存分享卡片
            </button>
        </div>
    </div>
    
    <form method="dialog" class="modal-backdrop bg-stone-900/60 backdrop-blur-sm">
        <button>close</button>
    </form>
</dialog>

<script>
    // --- 稀有度映射 ---
    const RARITY_MAP = {
        'common': '普通',
        'rare': '稀有',
        'epic': '史诗',
        'legendary': '传说'
    };

    // --- 数据注入 ---
    // 使用 tojson 过滤器（如果在 Flask 环境），或者更加安全的手动构造
    const SERVER_DATA = {
        categories: [
            { id: 'all', name: '全部' },
            {% for cat in categories %}
            { id: '{{ cat }}', name: '{{ cat }}' }{{ "," if not loop.last }}
            {% endfor %}
        ],
        achievements: [
            // 已获得
            {% for ub in user_badges %}
            {
                "id": {{ ub.badge.id }}, 
                "name": "{{ ub.badge.name|replace('"', '\\"') }}",
                "description": "{{ ub.badge.description|replace('"', '\\"')|replace('\n', ' ') }}",
                "category": "{{ ub.badge.category or '一般' }}",
                "rarity": "{{ ub.badge.rarity or 'common' }}",
                "isSecret": {{ 'true' if ub.badge.is_secret else 'false' }},
                "isUnlocked": true, 
                "unlockDate": "{{ ub.earned_at.strftime('%Y.%m.%d') }}",
                "isImage": {{ 'true' if ub.badge.icon|is_image_icon else 'false' }},
                "iconUrl": "{{ ub.badge.icon|badge_icon_url }}",
                "iconText": "{{ ub.badge.icon if not ub.badge.icon|is_image_icon else '' }}",
                "issuer": "{{ ub.badge.issuer or 'WikiBook' }}",
                "serialNumber": "{{ ub.serial_number or 'SF-????' }}"
            },
            {% endfor %}
            // 未获得 (注意加上逗号，如果有已获得徽章)
            {% if user_badges and unearned_badges %},{% endif %}
            {% for b in unearned_badges %}
            {
                "id": {{ b.id }}, 
                "name": "{{ b.name|replace('"', '\\"') }}",
                "description": "{{ b.description|replace('"', '\\"')|replace('\n', ' ') }}",
                "category": "{{ b.category or '一般' }}",
                "rarity": "{{ b.rarity or 'common' }}",
                "isSecret": {{ 'true' if b.is_secret else 'false' }},
                "isUnlocked": false, 
                "unlockDate": null,
                "isImage": {{ 'true' if b.icon|is_image_icon else 'false' }},
                "iconUrl": "{{ b.icon|badge_icon_url }}",
                "iconText": "{{ b.icon if not b.icon|is_image_icon else '' }}",
                "issuer": "{{ b.issuer or 'WikiBook' }}",
                "serialNumber": null
            }{{ "," if not loop.last }}
            {% endfor %}
        ]
    };

    document.addEventListener('DOMContentLoaded', () => {
        const listContainer = document.getElementById('achievements-list');
        const tabsContainer = document.getElementById('category-tabs');
        const emptyState = document.getElementById('empty-state');
        const modal = document.getElementById('badge-modal');
        
        let currentFilter = 'all';
        
        initStats();
        renderTabs();
        renderList('all');

        function initStats() {
            const total = SERVER_DATA.achievements.length;
            const unlocked = SERVER_DATA.achievements.filter(a => a.isUnlocked).length;
            const rate = total === 0 ? 0 : Math.round((unlocked / total) * 100);
            
            document.getElementById('total-badge-count').innerText = total;
            document.getElementById('unlocked-count').innerText = unlocked;
            document.getElementById('total-count').innerText = total;
            document.getElementById('completion-rate').innerText = `${rate}%`;
            
            // 动画设置进度
            setTimeout(() => {
                document.getElementById('progress-circle').setAttribute('stroke-dasharray', `${rate}, 100`);
            }, 300);
        }

        function renderTabs() {
            tabsContainer.innerHTML = SERVER_DATA.categories.map(cat => `
                <button onclick="filterAchievements('${cat.id}')" 
                    class="px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 tab-btn whitespace-nowrap ${cat.id === 'all' ? 'bg-amber-500 text-white shadow-md shadow-orange-200' : 'text-stone-500 hover:bg-stone-50 hover:text-stone-800'}" 
                    data-id="${cat.id}">
                    ${cat.name}
                </button>
            `).join('');
        }

        window.filterAchievements = function(categoryId) {
            currentFilter = categoryId;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const isActive = btn.dataset.id === categoryId;
                btn.className = isActive 
                    ? 'px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 tab-btn whitespace-nowrap bg-amber-500 text-white shadow-md shadow-orange-200 transform scale-105'
                    : 'px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 tab-btn whitespace-nowrap text-stone-500 hover:bg-stone-50 hover:text-stone-800';
            });
            renderList(categoryId);
        };

        window.openBadgeDetail = function(id) {
            const item = SERVER_DATA.achievements.find(a => a.id === id);
            if (!item) return;

            // 1. 基础信息
            const isUnknown = item.isSecret && !item.isUnlocked;
            document.getElementById('modal-title').innerText = isUnknown ? "???" : item.name;
            document.getElementById('modal-desc').innerText = isUnknown ? "继续探索以揭示此成就的获取方式" : (item.description || '暂无描述');
            
            // 2. 稀有度标签
            const rarityText = RARITY_MAP[item.rarity] || '普通';
            const rarityBadgeHtml = `<span class="rarity-badge bg-stone-400">${rarityText}</span>`; // 默认为灰色
            const rarityContainer = document.getElementById('modal-rarity-tag');
            
            // 只有解锁了或者是公开成就才显示稀有度颜色
            if (!isUnknown) {
                rarityContainer.className = `rarity-${item.rarity}`; 
                rarityContainer.innerHTML = `<span class="rarity-badge shadow-sm">${rarityText}</span>`;
            } else {
                rarityContainer.className = '';
                rarityContainer.innerHTML = `<span class="rarity-badge bg-stone-200 text-stone-400">未知</span>`;
            }

            document.getElementById('modal-issuer').innerText = item.issuer;
            document.getElementById('modal-date').innerText = item.isUnlocked ? item.unlockDate : '--.--.--';
            document.getElementById('modal-serial').innerText = item.isUnlocked ? (item.serialNumber || 'SF-????') : '--';

            // 3. 图片展示
            const imgContainer = document.getElementById('modal-sticker-img-container');
            if (item.isImage && !isUnknown) {
                imgContainer.innerHTML = `<img src="${item.iconUrl}" class="sticker-img-large w-48 h-48 object-contain ${item.isUnlocked ? '' : 'grayscale opacity-50 blur-sm'}" crossOrigin="anonymous">`;
            } else {
                const icon = isUnknown ? '❓' : (item.iconText || '🏅');
                imgContainer.innerHTML = `<div class="w-48 h-48 flex items-center justify-center text-8xl ${item.isUnlocked ? '' : 'grayscale opacity-40'}">${icon}</div>`;
            }

            // 4. 按钮状态
            const btn = document.getElementById('share-btn');
            if (item.isUnlocked) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }

            modal.showModal();
        };

        window.generateShareCard = function() {
            const btn = document.getElementById('share-btn');
            const originalText = btn.innerHTML;
            
            // Loading state
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';
            btn.disabled = true;

            // 选择只截图上半部分的卡片内容区域
            const element = document.getElementById('share-capture-area');
            
            html2canvas(element, {
                backgroundColor: '#ffffff',
                scale: 2, // 高清
                useCORS: true,
                logging: false,
                allowTaint: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `my-badge-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Restore state
                btn.innerHTML = originalText;
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                alert('图片生成失败，请稍后重试');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        };

        function renderList(filter) {
            listContainer.innerHTML = '';
            
            const items = SERVER_DATA.achievements
                .filter(item => filter === 'all' || item.category === filter)
                .sort((a, b) => {
                    // 1. 已获得在前
                    if (a.isUnlocked && !b.isUnlocked) return -1;
                    if (!a.isUnlocked && b.isUnlocked) return 1;
                    // 2. 获得的按时间倒序
                    if (a.isUnlocked && b.isUnlocked) {
                        return b.unlockDate.localeCompare(a.unlockDate);
                    }
                    // 3. 未获得的按稀有度 (简单按ID排序保持稳定)
                    return a.id - b.id;
                });

            document.getElementById('list-display-count').innerText = items.length;

            if (items.length === 0) {
                emptyState.classList.remove('hidden'); emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden'); emptyState.classList.remove('flex');
            }
            
            // 使用 DocumentFragment 优化性能
            const fragment = document.createDocumentFragment();

            items.forEach((item, index) => {
                const el = document.createElement('div');
                // 关键修复：添加 rarity-class 到列表项容器
                el.className = `badge-list-item ${item.isUnlocked ? 'unlocked' : 'locked'} rarity-${item.rarity} animate-card`;
                el.style.animationDelay = `${index * 0.05}s`; // 瀑布流动画
                el.onclick = () => window.openBadgeDetail(item.id);
                
                const isUnknown = item.isSecret && !item.isUnlocked;
                
                const iconHtml = (item.isImage && !isUnknown)
                    ? `<img src="${item.iconUrl}" class="w-10 h-10 object-contain" loading="lazy">`
                    : `<span class="text-2xl">${isUnknown ? '❓' : (item.iconText || '🏅')}</span>`;

                const dateText = item.isUnlocked ? item.unlockDate : '未解锁';
                const nameText = isUnknown ? '???' : item.name;
                const rarityText = RARITY_MAP[item.rarity];
                
                // 只有解锁的才显示稀有度标签
                const rarityTag = item.isUnlocked 
                    ? `<span class="rarity-badge text-[10px] ml-2 scale-90 origin-left opacity-80">${rarityText}</span>` 
                    : '';

                el.innerHTML = `
                    <div class="badge-icon-wrapper">
                        ${iconHtml}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center">
                            <h3 class="font-bold text-stone-800 text-base truncate">${nameText}</h3>
                            ${rarityTag}
                        </div>
                        <p class="text-xs text-stone-400 font-mono mt-1 flex items-center gap-1">
                            ${item.isUnlocked ? '<i class="far fa-calendar-check text-green-500"></i>' : '<i class="fas fa-lock text-stone-300"></i>'}
                            ${dateText}
                        </p>
                    </div>
                    <div class="text-stone-300 pl-2">
                        <i class="fas fa-chevron-right text-xs"></i>
                    </div>
                `;
                fragment.appendChild(el);
            });
            
            listContainer.appendChild(fragment);
        }
    });
</script>
{% endblock %}

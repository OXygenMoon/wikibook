{% extends "base.html" %}

{% block title %}{{ user.username }} 的记忆书签册{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-cold: #6366f1;
        --bg-cold: #e0e7ff;
    }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes gradient-flow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* 书签列表项 */
    .bookmark-list-item {
        display: flex; align-items: center; gap: 1rem; padding: 1rem;
        background: #ffffff; border-radius: 1rem; border: 1px solid #f3f4f6;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer; position: relative; overflow: hidden;
    }
    .bookmark-list-item:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }
    .bookmark-list-item.locked { opacity: 0.6; background: #fafaf9; }
    .bookmark-list-item.locked .icon-wrapper { filter: grayscale(100%) opacity(0.5); }

    .icon-wrapper {
        width: 4rem; height: 5rem; /* 书签修长比例 */
        flex-shrink: 0; border-radius: 0.5rem;
        display: flex; align-items: center; justify-content: center;
        background: #f8fafc; border: 1px solid #e2e8f0;
        transition: transform 0.3s ease; position: relative;
    }

    /* 稀有度标签 */
    .rarity-badge {
        font-size: 0.65rem; padding: 2px 8px; border-radius: 99px;
        color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
        background-size: 200% 200%; animation: gradient-flow 4s ease infinite;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block;
        margin-left: 8px; vertical-align: middle;
    }

    /* Common */
    .rarity-common .rarity-badge { background-image: linear-gradient(135deg, #94a3b8, #64748b); }
    .bookmark-list-item.unlocked.rarity-common { border-left: 4px solid #cbd5e1; }
    
    /* Rare */
    .rarity-rare .rarity-badge { background-image: linear-gradient(135deg, #3b82f6, #60a5fa); }
    .bookmark-list-item.unlocked.rarity-rare { border-left: 4px solid #3b82f6; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1); }
    
    /* Epic */
    .rarity-epic .rarity-badge { background-image: linear-gradient(135deg, #d946ef, #a855f7); }
    .bookmark-list-item.unlocked.rarity-epic { border-left: 4px solid #d946ef; background: linear-gradient(to right, #fdf4ff, #fff); }
    
    /* Legendary */
    .rarity-legendary .rarity-badge { background-image: linear-gradient(135deg, #f59e0b, #fbbf24); animation: gradient-flow 2s linear infinite; }
    .bookmark-list-item.unlocked.rarity-legendary { border: 1px solid #fcd34d; border-left: 4px solid #f59e0b; background: linear-gradient(to right, #fffbeb, #fff); box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.15); }

    .circular-chart { display: block; margin: 0 auto; max-width: 100%; max-height: 250px; }
    .circle-bg { fill: none; stroke: #e0e7ff; stroke-width: 3.8; } 
    .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; transition: stroke-dasharray 1s ease-out; }
    .animate-card { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }

    html.dark #bookmark-book-container {
        background: #0f1116 !important;
    }
    html.dark #bookmark-book-container .bookmark-list-item {
        background: #1a1f28;
        border-color: rgba(255, 255, 255, 0.14);
        color: #e5e7eb;
    }
    html.dark #bookmark-book-container .bookmark-list-item.locked {
        background: #171b22;
    }
    html.dark #bookmark-book-container .icon-wrapper {
        background: #11161d;
        border-color: rgba(255, 255, 255, 0.16);
    }
    html.dark #bookmark-book-container .circle-bg {
        stroke: #334155;
    }
</style>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
{% endblock %}

{% block content %}
<div id="bookmark-book-container" class="max-w-[1400px] mx-auto px-4 sm:px-6 py-8 min-h-screen bg-[#f8fafc]">
    
    <div class="bg-base-100 rounded-3xl shadow-sm border border-indigo-100 p-6 md:p-8 mb-8 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-80 h-80 bg-indigo-50 rounded-full blur-3xl opacity-60 -mr-20 -mt-20 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-64 h-64 bg-blue-50 rounded-full blur-3xl opacity-60 -ml-16 -mb-16 pointer-events-none"></div>

        <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
            <div class="flex items-start gap-5 w-full md:w-auto">
                <a href="{{ url_for('public_profile', user_id=user.id) }}" class="btn btn-circle btn-ghost bg-stone-50 hover:bg-indigo-100 text-base-content/80 hover:text-indigo-600 transition-all border-none">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-base-content tracking-tight flex items-center gap-3 flex-wrap">
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-500">记忆图鉴</span>
                        <span class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold align-top mt-1 border border-indigo-200 shadow-sm">
                            共 <span id="total-count-label">0</span> 枚
                        </span>
                    </h1>
                    <p class="text-base-content/80 mt-3 text-sm md:text-base max-w-lg font-medium leading-relaxed">
                        记录阅读的轨迹。集齐各种奇妙的书签，把知识装进你的专属夹页。
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-6 bg-base-100/80 backdrop-blur-md p-4 pr-8 rounded-2xl border border-indigo-100 shadow-sm">
                <div class="relative w-16 h-16">
                    <svg viewBox="0 0 36 36" class="circular-chart text-indigo-500 transform -rotate-90">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" id="progress-circle" stroke="currentColor" />
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center text-[11px] font-bold text-indigo-600">
                        <span id="completion-rate">0%</span>
                    </div>
                </div>
                <div>
                    <div class="text-[10px] text-base-content/50 uppercase font-bold tracking-wider mb-1">收集进度</div>
                    <div class="text-2xl font-black text-base-content leading-none">
                        <span id="unlocked-count" class="text-indigo-600">0</span>
                        <span class="text-stone-300 text-lg font-normal mx-0.5">/</span>
                        <span id="total-count" class="text-base-content/50 text-lg font-normal">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-end mb-4 px-2 max-w-3xl mx-auto w-full">
        <h2 class="text-lg font-bold text-base-content flex items-center gap-2">
            <i class="fas fa-bookmark text-base-content/50 text-sm"></i> 全部书签
        </h2>
    </div>

    <div id="bookmark-list" class="flex flex-col gap-3 pb-20 max-w-3xl mx-auto"></div>
</div>

<dialog id="bookmark-modal" class="modal bg-black/50 backdrop-blur-md z-[200]">
    <div class="modal-box w-11/12 max-w-[400px] bg-white dark:bg-base-200 rounded-[2rem] p-6 md:p-8 relative overflow-hidden shadow-2xl text-left border border-white/50 dark:border-base-content/10 hide-scrollbar" id="bookmark-modal-box">
        
        <div id="modal-gradient" class="absolute -top-20 -right-20 w-80 h-80 opacity-60 rounded-full blur-3xl -z-10 transition-colors duration-500"></div>
        <div class="absolute top-0 right-0 w-[150%] h-[150%] bg-white/40 dark:bg-base-100/40 transform -rotate-12 translate-x-1/3 -translate-y-1/4 z-0 pointer-events-none"></div>

        <div id="share-capture-area" class="relative z-10 w-full bg-transparent">
            <div class="w-[60%] pr-2 min-h-[100px]">
                <p class="mb-2 flex items-center gap-1.5 drop-shadow-sm">
                    <span id="modal-rarity-tag"></span>
                </p>
                <h3 id="modal-title" class="text-2xl md:text-3xl font-black text-stone-800 dark:text-white mb-2 leading-tight tracking-tight drop-shadow-sm break-all line-clamp-2"></h3>
                <p id="modal-desc" class="text-stone-500 dark:text-stone-400 font-medium mb-6 leading-relaxed text-xs break-all line-clamp-3"></p>
            </div>
            
            <div class="absolute right-0 top-6 w-28 h-36 md:w-32 md:h-40 drop-shadow-xl hover:scale-110 hover:-translate-y-2 transition-transform duration-500 flex items-center justify-center pointer-events-none z-20 origin-top bg-white/50 backdrop-blur-sm border border-white/80 rounded-xl" id="modal-sticker-img-container"></div>

            <div class="mt-4 flex flex-col gap-4 pt-5 border-t border-stone-100 dark:border-stone-700/50">
                <div class="flex items-end gap-6 text-stone-400 dark:text-stone-500 text-[10px] font-mono">
                    <div>
                        <p class="mb-0.5 tracking-widest uppercase opacity-70">收集日期</p>
                        <p id="modal-date" class="font-bold text-stone-600 dark:text-stone-300 text-xs tracking-wider">--.--.--</p>
                    </div>
                </div>
                <div class="flex items-center justify-between w-full mt-1 pt-4 border-t border-stone-50 dark:border-stone-800/50">
                    <div class="flex items-center gap-2 bg-stone-50 dark:bg-base-300 py-1.5 px-2.5 rounded-full border border-stone-200/50 dark:border-stone-600 shadow-sm">
                        <div class="w-6 h-6 rounded-full bg-gradient-to-br from-[#e0e7ff] to-[#c7d2fe] text-indigo-700 font-extrabold text-[10px] flex items-center justify-center shadow-inner">
                            <span id="modal-avatar">{{ user.username[0] | upper }}</span>
                        </div>
                        <span id="modal-username" class="text-stone-600 dark:text-stone-300 font-bold text-[10px] tracking-wide pr-1">{{ user.username }}</span>
                    </div>
                    <div class="flex items-center gap-1.5 font-bold text-stone-400 dark:text-stone-500 italic text-[11px] tracking-tighter cursor-default">
                        <div class="w-3.5 h-3.5 rounded-full bg-gradient-to-tr from-[#6366f1] to-[#818cf8] shadow-sm"></div>
                        <span>WikiBook</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 flex gap-3 relative z-10">
            <button onclick="generateShareCard()" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl py-3 h-auto min-h-0 text-sm font-bold shadow-md shadow-indigo-500/20 transition-colors btn" id="share-btn">
                <i class="fas fa-share-nodes mr-1.5"></i>分享荣誉
            </button>
            <form method="dialog" class="m-0">
                <button class="btn h-auto min-h-0 py-3 rounded-xl bg-stone-100 hover:bg-stone-200 dark:bg-base-300 dark:hover:bg-base-100 border-none text-stone-500 dark:text-stone-400 font-bold">
                    关闭
                </button>
            </form>
        </div>
        
        <form method="dialog" class="absolute top-4 right-4 z-30 m-0">
            <button class="btn btn-circle btn-sm btn-ghost bg-black/5 dark:bg-white/10 text-stone-500 dark:text-white hover:text-stone-900 dark:hover:bg-white/20 transition-all shadow-sm backdrop-blur-md">✕</button>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script>
    const RARITY_MAP = { 'common': '普通', 'rare': '稀有', 'epic': '史诗', 'legendary': '传说' };

    const SERVER_DATA = {
        bookmarks: [
            // 已获得
            {% for ub in user_bookmarks %}
            {
                "id": {{ ub.bookmark_type.id }}, 
                "name": "{{ ub.bookmark_type.name|replace('"', '\\"') }}",
                "description": "{{ ub.bookmark_type.description|replace('"', '\\"')|replace('\n', ' ') if ub.bookmark_type.description else '暂无寓意...' }}",
                "rarity": "{{ ub.bookmark_type.rarity or 'common' }}",
                "isUnlocked": true, 
                "unlockDate": "{{ ub.earned_at.strftime('%Y.%m.%d') }}",
                "isImage": {{ 'true' if ub.bookmark_type.icon|is_image_icon else 'false' }},
                "iconUrl": "{{ ub.bookmark_type.icon|badge_icon_url }}",
                "iconText": "{{ ub.bookmark_type.icon if not ub.bookmark_type.icon|is_image_icon else '' }}"
            },
            {% endfor %}
            {% if user_bookmarks and unearned_bookmarks %},{% endif %}
            
            // 未获得
            {% for b in unearned_bookmarks %}
            {
                "id": {{ b.id }}, 
                "name": "{{ b.name|replace('"', '\\"') }}",
                "description": "{{ b.description|replace('"', '\\"')|replace('\n', ' ') if b.description else '暂无描述' }}",
                "rarity": "{{ b.rarity or 'common' }}",
                "isUnlocked": false, 
                "unlockDate": null,
                "isImage": {{ 'true' if b.icon|is_image_icon else 'false' }},
                "iconUrl": "{{ b.icon|badge_icon_url }}",
                "iconText": "{{ b.icon if not b.icon|is_image_icon else '' }}"
            }{{ "," if not loop.last }}
            {% endfor %}
        ]
    };

    document.addEventListener('DOMContentLoaded', () => {
        const listContainer = document.getElementById('bookmark-list');
        
        // 初始化统计
        const total = SERVER_DATA.bookmarks.length;
        const unlocked = SERVER_DATA.bookmarks.filter(a => a.isUnlocked).length;
        const rate = total === 0 ? 0 : Math.round((unlocked / total) * 100);
        
        document.getElementById('total-count-label').innerText = total;
        document.getElementById('unlocked-count').innerText = unlocked;
        document.getElementById('total-count').innerText = total;
        document.getElementById('completion-rate').innerText = `${rate}%`;
        
        setTimeout(() => {
            document.getElementById('progress-circle').setAttribute('stroke-dasharray', `${rate}, 100`);
        }, 300);

        // 渲染列表 (已解锁在前)
        const items = SERVER_DATA.bookmarks.sort((a, b) => {
            if (a.isUnlocked && !b.isUnlocked) return -1;
            if (!a.isUnlocked && b.isUnlocked) return 1;
            if (a.isUnlocked && b.isUnlocked) return b.unlockDate.localeCompare(a.unlockDate);
            return a.id - b.id;
        });

        const fragment = document.createDocumentFragment();
        
        items.forEach((item, index) => {
            const el = document.createElement('div');
            el.className = `bookmark-list-item ${item.isUnlocked ? 'unlocked' : 'locked'} rarity-${item.rarity} animate-card`;
            el.style.animationDelay = `${index * 0.05}s`;
            el.onclick = () => window.openBookmarkDetail(item.id);
            
            const iconHtml = item.isImage
                ? `<img src="${item.iconUrl}" class="w-8 h-8 object-contain">`
                : `<span class="text-2xl">${item.iconText || '🔖'}</span>`;

            const rarityTag = item.isUnlocked 
                ? `<span class="rarity-badge text-[10px] ml-2 scale-90 origin-left opacity-80">${RARITY_MAP[item.rarity]}</span>` 
                : '';

            el.innerHTML = `
                <div class="icon-wrapper">
                    ${iconHtml}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center">
                        <h3 class="font-bold text-base-content text-base truncate">${item.isUnlocked ? item.name : '???'}</h3>
                        ${rarityTag}
                    </div>
                    <p class="text-xs text-base-content/50 font-mono mt-1 flex items-center gap-1">
                        ${item.isUnlocked ? '<i class="far fa-calendar-check text-indigo-500"></i>' : '<i class="fas fa-lock text-stone-300"></i>'}
                        ${item.isUnlocked ? item.unlockDate : '未知书签，继续探索...'}
                    </p>
                </div>
                <div class="text-stone-300 pl-2"><i class="fas fa-chevron-right text-xs"></i></div>
            `;
            fragment.appendChild(el);
        });
        
        listContainer.appendChild(fragment);

        window.openBookmarkDetail = function(id) {
            const item = SERVER_DATA.bookmarks.find(a => a.id === id);
            if (!item) return;

            document.getElementById('modal-title').innerText = item.isUnlocked ? item.name : "???";
            document.getElementById('modal-desc').innerText = item.isUnlocked ? item.description : "继续保持良好的阅读与笔记习惯，就能解锁这枚神秘书签。";
            
            const rarityText = RARITY_MAP[item.rarity] || '普通';
            const rarityContainer = document.getElementById('modal-rarity-tag');
            const gradientBg = document.getElementById('modal-gradient');
            
            if (item.isUnlocked) {
                rarityContainer.innerText = `✨ ${rarityText}`;
                rarityContainer.className = `text-[10px] px-2 py-0.5 rounded-full shadow-sm rarity-${item.rarity} text-black font-bold`;
                let colorClasses = "from-stone-400 to-stone-200";
                if (item.rarity === 'rare') colorClasses = "from-blue-400 to-indigo-300";
                else if (item.rarity === 'epic') colorClasses = "from-fuchsia-500 to-purple-400";
                else if (item.rarity === 'legendary') colorClasses = "from-amber-400 to-orange-400";
                gradientBg.className = `absolute -top-20 -right-20 w-80 h-80 opacity-60 rounded-full blur-3xl -z-10 transition-colors duration-500 bg-gradient-to-bl ${colorClasses}`;
            } else {
                rarityContainer.innerText = "🔒 未知";
                rarityContainer.className = "text-[10px] bg-stone-200 text-stone-500 px-2 py-0.5 rounded-full font-bold";
                gradientBg.className = "absolute -top-20 -right-20 w-80 h-80 opacity-50 rounded-full blur-3xl -z-10 bg-gradient-to-bl from-stone-300 to-stone-100";
            }

            document.getElementById('modal-date').innerText = item.isUnlocked ? item.unlockDate : '--.--.--';

            const imgContainer = document.getElementById('modal-sticker-img-container');
            if (item.isImage && item.isUnlocked) {
                imgContainer.innerHTML = `<img src="${item.iconUrl}" class="max-w-full max-h-full object-contain filter drop-shadow-[0_10px_20px_rgba(0,0,0,0.2)]" crossOrigin="anonymous">`;
            } else {
                const icon = item.isUnlocked ? (item.iconText || '🔖') : '❓';
                imgContainer.innerHTML = `<span class="text-[5rem] drop-shadow-lg leading-none ${item.isUnlocked ? '' : 'grayscale opacity-40'}">${icon}</span>`;
            }

            document.getElementById('share-btn').style.display = item.isUnlocked ? 'flex' : 'none';

            const modalBox = document.getElementById('bookmark-modal-box');
            modalBox.classList.remove('scale-100', 'opacity-100');
            modalBox.classList.add('scale-95', 'opacity-0');
            
            const modal = document.getElementById('bookmark-modal');
            modal.showModal();
            
            requestAnimationFrame(() => {
                modalBox.classList.remove('scale-95', 'opacity-0');
                modalBox.classList.add('scale-100', 'opacity-100');
            });
        };

        window.generateShareCard = function() {
            const btn = document.getElementById('share-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';
            btn.disabled = true;

            const element = document.getElementById('share-capture-area');
            html2canvas(element, {
                backgroundColor: '#ffffff', scale: 2, useCORS: true, logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `my-bookmark-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.innerHTML = originalText; btn.disabled = false;
            }).catch(err => {
                alert('图片生成失败，请稍后重试');
                btn.innerHTML = originalText; btn.disabled = false;
            });
        };
    });
</script>
{% endblock %}

server {
    listen 20017;
    server_name _;

    location /static {
        alias /root/projects/wikibook/static;
        expires 30d;
    }

    location / {
        proxy_pass http://127.0.0.1:5009;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8 flex items-center gap-2">
        <div class="w-3 h-3 rounded-full bg-success"></div>
        在线用户 ({{ users|length }})
    </h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for status in users %}
        <div class="card bg-base-100 shadow-xl border border-base-200">
            <div class="card-body flex-row items-center gap-4">
                <div class="avatar placeholder">
                    <div class="bg-neutral-focus text-neutral-content rounded-full w-12 h-12">
                        <span class="text-xl">{{ status.user.username[0] | upper }}</span>
                    </div>
                </div>
                <div>
                    <h2 class="card-title text-base">{{ status.user.username }}</h2>
                    <p class="text-sm text-base-content/60">{{ status.current_action }}</p>
                    <p class="text-xs text-base-content/40 mt-1">最后活跃: {{ status.last_active_at.strftime('%H:%M:%S') }}</p>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-span-full text-center py-12 text-base-content/40">
            暂无其他在线用户
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}时序终端 - WikiBook{% endblock %}

{% block extra_css %}
<script src="{{ url_for('static', filename='js/fullcalendar.min.js') }}"></script>
<style>
    /* ==========================================
       FWA 极简野兽派风格 (Brutalist / Grid UI)
       ========================================== */
    body {
        background-color: #f5f5f5 !important;
        color: #111;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    /* 极简网格容器与边框 */
    .grid-border { border-color: rgba(0,0,0,0.15); }
    .dark .grid-border { border-color: rgba(255,255,255,0.15); }

    /* 横线纹理背景 */
    .stripe-pattern {
        background-image: repeating-linear-gradient(to bottom, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px);
    }

    /* 隐藏滚动条并自定义 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; border-left: 1px solid rgba(0,0,0,0.1); }
    .custom-scroll::-webkit-scrollbar-thumb { background: #111; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--theme-primary); }

    /* 极简按钮 */
    .btn-brutal {
        background: #111; color: #fff; border-radius: 2px; font-size: 12px; font-weight: 800; text-transform: uppercase;
        padding: 0.6rem 1.2rem; transition: transform 0.1s, box-shadow 0.1s; display: inline-flex; align-items: center; justify-center; border: 1px solid #111;
        letter-spacing: 0.05em; cursor: pointer; box-shadow: 4px 4px 0 #111;
    }
    .btn-brutal:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #111; color: #fff; }
    .btn-brutal:active { transform: translate(4px, 4px); box-shadow: 0 0 0 #111; }
    
    .btn-brutal-outline {
        background: #fff; color: #111; border: 1px solid #111; border-radius: 2px; font-size: 12px; font-weight: 800; text-transform: uppercase;
        padding: 0.6rem 1.2rem; transition: transform 0.1s, box-shadow 0.1s; display: inline-flex; align-items: center; justify-center;
        letter-spacing: 0.05em; cursor: pointer; box-shadow: 4px 4px 0 #111;
    }
    .btn-brutal-outline:hover { background: #111; color: #fff; transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #111; }
    .btn-brutal-outline:active { transform: translate(4px, 4px); box-shadow: 0 0 0 #111; }

    /* 表单输入框 (Input Terminal) */
    .terminal-input {
        background: #fff; border: 1px solid rgba(0,0,0,0.2); border-radius: 2px; font-family: monospace; font-size: 13px;
        transition: border-color 0.2s, box-shadow 0.2s; padding: 0.5rem 1rem; width: 100%;
    }
    .terminal-input:focus { border-color: #111; box-shadow: 4px 4px 0px rgba(0,0,0,1); outline: none; }

    /* 弹窗粗犷阴影 */
    .modal-brutal { box-shadow: 16px 16px 0px rgba(0,0,0,1); border: 2px solid #111; }

    /* ==========================================
       FullCalendar 深度定制 (Brutalist Override)
       ========================================== */
    :root {
        --fc-border-color: rgba(0,0,0,0.15);
        --fc-button-bg-color: #fff;
        --fc-button-border-color: #111;
        --fc-button-text-color: #111;
        --fc-button-hover-bg-color: #111;
        --fc-button-hover-border-color: #111;
        --fc-button-active-bg-color: #111;
        --fc-button-active-border-color: #111;
        --fc-today-bg-color: rgba(0,0,0,0.03);
        --fc-event-bg-color: #111;
        --fc-event-border-color: #111;
    }

    .fc { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

    /* 日历头部标题 */
    .fc-toolbar-title {
        font-size: 1.5rem !important; font-weight: 900 !important; color: #111;
        text-transform: uppercase; letter-spacing: -0.02em;
    }
    .fc-toolbar { margin-bottom: 1.5rem !important; }
    
    /* 机械感按钮 */
    .fc-button {
        border-radius: 2px !important; padding: 0.4rem 0.8rem !important;
        font-size: 10px !important; font-weight: 800 !important; text-transform: uppercase !important;
        letter-spacing: 0.1em; transition: all 0.1s !important; box-shadow: 3px 3px 0 #111 !important;
        background-color: #fff !important; color: #111 !important; border: 1px solid #111 !important;
    }
    .fc-button:hover { background-color: #f0f0f0 !important; transform: translate(-1px, -1px); box-shadow: 4px 4px 0 #111 !important; }
    .fc-button:active, .fc-button.fc-button-active {
        background-color: #111 !important; color: #fff !important;
        box-shadow: 0 0 0 #111 !important; transform: translate(3px, 3px);
    }
    .fc-button:focus { box-shadow: 3px 3px 0 #111 !important; outline: none !important; }
    
    /* 日历网格细节 */
    .fc-daygrid-day-frame { min-height: 100px !important; }
    .fc-daygrid-day { transition: background-color 0.2s; }
    .fc-daygrid-day:hover { background-color: #fafafa; }
    .fc-daygrid-day-number { font-weight: 900; font-family: monospace; font-size: 14px; padding: 4px 8px !important; }
    .fc-col-header-cell { padding: 0.5rem 0 !important; background: #fafafa; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; }

    /* 事件胶囊 (Brutalist Events) */
    .fc-event {
        cursor: pointer; border-radius: 0 !important; padding: 2px 4px;
        font-size: 10px !important; font-family: monospace; font-weight: bold; text-transform: uppercase;
        border: 1px solid #111 !important; transition: transform 0.1s, box-shadow 0.1s;
    }
    .fc-event:hover { transform: translate(-2px, -2px); box-shadow: 3px 3px 0 #111; z-index: 10; }
    
    /* 💡 新增：强制内部文本继承我们在 JS 里计算好的颜色，防止变成白字 */
    .fc-event .fc-event-main, 
    .fc-event .fc-event-main * {
        color: inherit !important;
    }

    html.dark .book-calendar-page .stripe-pattern {

{% block scripts %}
<script>
    let calendar;
    
    // 💡 Brutalist (野兽派) 高饱和荧光色签
    const tagColors = [
        '#FFDF00', // Cyber Yellow
        '#00FF66', // Neon Green
        '#FF3366', // Hot Pink
        '#00E5FF', // Cyan
        '#FF6600', // Neon Orange
        '#B026FF', // Purple
        '#111111'  // Pure Black
    ];
    // 决定文字颜色的逻辑：背景是黑/紫时用白字，其他亮色用黑字
    const getTextColor = (bgColor) => ['#111111', '#B026FF'].includes(bgColor) ? '#FFFFFF' : '#111111';
    
    const tagColorMap = new Map();

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const tagFilter = document.getElementById('tag-filter');
        
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-cn',
            height: 'auto',
            contentHeight: 650, 
            aspectRatio: 1.8, 
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listMonth'
            },
            buttonText: {
                today: 'TODAY // 今日',
                month: 'GRID // 矩阵',
                list: 'FEED // 数据流'
            },
            events: '/api/notes/calendar',
            eventClick: function(info) {
                showSnapshot(info.event);
            },
            dateClick: function(info) {
                showQuickCreate(info.dateStr);
            },
eventDidMount: function(info) {
                // 颜色高亮逻辑
                const tags = info.event.extendedProps.tags;
                const isDark = document.documentElement.classList.contains('dark');
                const defaultBorderColor = isDark ? 'rgba(255,255,255,0.35)' : '#111';
                let textColor = '#111'; // 默认文字颜色
                
                if (tags && tags.length > 0) {
                    const primaryTag = tags[0];
                    if (!tagColorMap.has(primaryTag)) {
                        const colorIndex = tagColorMap.size % tagColors.length;
                        tagColorMap.set(primaryTag, tagColors[colorIndex]);
                    }
                    const bgColor = tagColorMap.get(primaryTag);
                    textColor = getTextColor(bgColor); // 根据背景算文字颜色
                    
                    info.el.style.backgroundColor = bgColor;
                    info.el.style.borderColor = defaultBorderColor;
                } else {
                    // 没有标签的默认样式：暗色主题下降低亮度以避免白块刺眼
                    info.el.style.backgroundColor = isDark ? 'rgba(255,255,255,0.08)' : '#fff';
                    info.el.style.borderColor = defaultBorderColor;
                    textColor = isDark ? '#e5e7eb' : '#111';
                }
                
                // 💡 核心修复：同时设置 color 和 CSS变量，彻底压制 FullCalendar 的默认白字
                info.el.style.color = textColor;
                info.el.style.setProperty('--fc-event-text-color', textColor);
                
                info.el.title = info.event.title;
            },
            loading: function(isLoading) {
                if (!isLoading) {
                    setTimeout(() => {
                        const events = calendar.getEvents();
                        populateTagFilter(events);
                    }, 100);
                }
            }
        });
        
        calendar.render();
        
        // 筛选逻辑
        tagFilter.addEventListener('change', function() {
            const selectedTag = this.value;
            const currentEvents = calendar.getEvents();
            currentEvents.forEach(e => {
                const tags = e.extendedProps.tags || [];
                let shouldShow = true;
                if (selectedTag && !tags.includes(selectedTag)) {
                    shouldShow = false;
                }
                e.setProp('display', shouldShow ? 'auto' : 'none');
            });
        });
    });

    function populateTagFilter(events) {
        const tagFilter = document.getElementById('tag-filter');
        const currentSelection = tagFilter.value;
        
        while (tagFilter.options.length > 1) {
            tagFilter.remove(1);
        }
        
        const uniqueTags = new Set();
        events.forEach(e => {
            const tags = e.extendedProps.tags || [];
            tags.forEach(t => uniqueTags.add(t));
        });
        
        if (uniqueTags.size === 0) return;
        
        Array.from(uniqueTags).sort().forEach(tag => {
            const option = document.createElement('option');
            option.value = tag;
            option.textContent = `[TAG] ${tag.toUpperCase()}`;
            tagFilter.appendChild(option);
        });
        
        if (currentSelection && uniqueTags.has(currentSelection)) {
            tagFilter.value = currentSelection;
        }
    }

    function showSnapshot(event) {
        const modal = document.getElementById('note_snapshot_modal');
        const props = event.extendedProps;
        const isDark = document.documentElement.classList.contains('dark');
        const frameColor = isDark ? 'rgba(255,255,255,0.35)' : '#111';
        const shadowColor = isDark ? 'rgba(0,0,0,0.55)' : '#111';

        document.getElementById('view-full-note').href = `/book/notes/${event.id}`;
        document.getElementById('snap-date').textContent = `TIMESTAMP: ${props.created_at || 'UNKNOWN'}`;
        document.getElementById('snap-title').textContent = event.title;
        
        // 渲染极简高对比 Tags
        const tagsContainer = document.getElementById('snap-tags');
        if (props.tags && props.tags.length > 0) {
            tagsContainer.innerHTML = props.tags.map(tag => {
                const color = tagColorMap.get(tag) || '#111';
                const textColor = getTextColor(color);
                return `<span class="px-2 py-0.5 text-[10px] font-bold uppercase tracking-widest" style="background-color: ${color}; color: ${textColor}; border: 1px solid ${frameColor}; box-shadow: 2px 2px 0 ${shadowColor};">${tag}</span>`;
            }).join('');
        } else {
            tagsContainer.innerHTML = `<span class="px-2 py-0.5 text-[10px] font-bold uppercase tracking-widest border border-stone-300 text-stone-400 snap-untagged">UNTAGGED</span>`;
        }

        // 内容
        document.getElementById('snap-content').innerHTML = props.content || '<span class="opacity-30 uppercase tracking-widest">DATA PAYLOAD EMPTY</span>';

        modal.showModal();
    }
    
    function showQuickCreate(dateStr) {
        const modal = document.getElementById('quick_create_modal');
        document.getElementById('create-date-display').textContent = dateStr;
        document.getElementById('create-date-input').value = dateStr;
        document.getElementById('new-note-title').value = `${dateStr} LOG`;
        
        modal.showModal();
    }
    
    function submitQuickNote() {
        const dateStr = document.getElementById('create-date-input').value;
        const title = document.getElementById('new-note-title').value;
        const content = document.getElementById('new-note-content').value;
        
        if (!title) {
            if(window.app && window.app.toast) window.app.toast.show('IDENTIFIER CANNOT BE EMPTY', 'error');
            else alert('请输入节点标题');
            return;
        }

        const btn = document.getElementById('execute-create-btn');
        const oldHtml = btn.innerHTML;
        btn.classList.add('pointer-events-none', 'opacity-50');
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> PROCESSING...';
        
        fetch('/book/notes/quick_create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, content: content })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // 实时写入日历面板
                calendar.addEvent({
                    id: data.note_id,
                    title: title,
                    start: dateStr,
                    extendedProps: {
                        content: content,
                        tags: [], 
                        created_at: dateStr + ' ' + new Date().toTimeString().split(' ')[0].substring(0,5)
                    }
                });
                
                document.getElementById('quick_create_modal').close();
                document.getElementById('new-note-title').value = '';
                document.getElementById('new-note-content').value = '';
                if(window.app && window.app.toast) window.app.toast.show('NODE CREATED SUCCESSFULLY', 'success');
            } else {
                alert('SYS ERROR: ' + data.error);
            }
        })
        .catch(err => {
            console.error(err);
            alert('NETWORK FAILURE');
        })
        .finally(() => {
            btn.classList.remove('pointer-events-none', 'opacity-50');
            btn.innerHTML = oldHtml;
        });
    }
</script>
{% endblock %}

{% extends "base.html" %}

{% block title %}全局样式配置 - WikiBook{% endblock %}

{% block extra_css %}
<style>
    /* 简单的淡入动画 */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .animate-fade-in {
        animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    
    /* 背景动画 */
    @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.05); }
        66% { transform: translate(-20px, 20px) scale(0.95); }
        100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob {
        animation: blob 10s infinite alternate;
    }
    .animation-delay-2000 { animation-delay: 2s; }
    
    /* 自定义代码输入框滚动条 */
    .css-editor::-webkit-scrollbar { width: 8px; height: 8px; }
    .css-editor::-webkit-scrollbar-track { background: transparent; }
    .css-editor::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
    .css-editor::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
{% endblock %}

{% block content %}
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none bg-stone-50 dark:bg-[#15191e] transition-colors duration-500">
    <div class="absolute top-[5%] right-[20%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[100px] animate-blob mix-blend-multiply opacity-50 dark:opacity-30"></div>
    <div class="absolute bottom-[10%] left-[10%] w-[500px] h-[500px] bg-purple-500/10 rounded-full blur-[120px] animate-blob animation-delay-2000 mix-blend-multiply opacity-50 dark:opacity-30"></div>
</div>

<div class="w-full max-w-5xl mx-auto flex flex-col gap-6 transition-all duration-500 ease-in-out pb-12 animate-fade-in">
    
    <div class="flex items-center justify-between mb-2 mt-2">
        <h1 class="text-3xl font-black text-stone-800 dark:text-stone-100 tracking-tight flex items-center gap-3">
            <i class="fab fa-css3-alt text-primary opacity-80"></i> 自定义 Markdown 样式
        </h1>
        <a href="{{ url_for('index') }}" class="btn btn-ghost bg-base-200/50 hover:bg-base-200 border-none rounded-xl gap-2 font-medium">
            <i class="fas fa-arrow-left text-base-content/50"></i> 返回首页
        </a>
    </div>

    <div class="card bg-white/90 dark:bg-base-100/90 backdrop-blur-2xl border border-black/5 dark:border-white/5 shadow-xl shadow-stone-200/20 dark:shadow-none overflow-hidden rounded-[2rem]">
        <div class="card-body p-6 lg:p-10 space-y-6">
            
            <div class="flex items-start gap-4 p-4 lg:p-5 bg-sky-50 dark:bg-sky-900/20 rounded-2xl border border-sky-100 dark:border-sky-800/50">
                <div class="flex-shrink-0 w-10 h-10 bg-sky-100 dark:bg-sky-900/50 text-sky-500 rounded-full flex items-center justify-center font-bold shadow-sm">
                    <i class="fas fa-lightbulb"></i>
                </div>
                <div>
                    <h3 class="font-bold text-sky-800 dark:text-sky-300 mb-1">编写指南</h3>
                    <p class="text-sm text-sky-700/80 dark:text-sky-400/80 leading-relaxed font-medium">
                        在此处编写的 CSS 会全局覆盖文章的渲染样式。系统已默认使用 <code class="bg-sky-200/50 dark:bg-sky-800/50 px-1.5 py-0.5 rounded font-mono text-xs text-sky-600 dark:text-sky-300">.markdown-body</code> 作为核心作用域。
                        您可以参考 Typora 的主题文件（如 <code class="bg-sky-200/50 dark:bg-sky-800/50 px-1.5 py-0.5 rounded font-mono text-xs text-sky-600 dark:text-sky-300">.typora-export</code>）进行深度定制。
                    </p>
                </div>
            </div>

            <form method="post" class="flex flex-col gap-6">
                <div class="form-control w-full relative group">
                    <div class="h-10 bg-[#161b22] rounded-t-2xl border border-b-0 border-[#30363d] flex items-center px-4 gap-2 transition-colors">
                        <div class="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
                        <div class="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>
                        <div class="w-3 h-3 rounded-full bg-[#27c93f]"></div>
                        <span class="ml-2 text-xs font-mono text-[#8b949e] font-bold tracking-widest uppercase">custom-style.css</span>
                    </div>
                    
                    <textarea 
                        name="css_text" 
                        class="textarea w-full h-[60vh] css-editor bg-[#0d1117] text-[#c9d1d9] font-mono text-[14px] leading-relaxed p-5 border border-t-0 border-[#30363d] rounded-b-2xl rounded-t-none focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all resize-y shadow-inner" 
                        spellcheck="false"
                        placeholder="/* 在此输入您的 CSS 代码... */&#10;.markdown-body {&#10;    /* your styles */&#10;}"
                    >{{ css_text }}</textarea>
                </div>

                <div class="flex items-center justify-end gap-4 pt-4 border-t border-base-200">
                    <a href="{{ url_for('index') }}" class="btn btn-ghost font-medium text-base-content/60 hover:text-base-content hover:bg-base-200 rounded-xl px-6">
                        取消修改
                    </a>
                    <button type="submit" class="btn btn-primary btn-lg rounded-xl px-10 shadow-lg shadow-primary/30 hover:-translate-y-0.5 transition-all text-white font-bold gap-2">
                        <i class="fas fa-save"></i>
                        保存并应用
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}

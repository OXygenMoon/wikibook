{% extends "base.html" %}

{% block title %}{{ payload.project.title }} - OJ 训练{% endblock %}

{% block extra_css %}
<style>
  .questbook-app {
    height: calc(100vh - 4.25rem);
    min-height: 720px;
    margin: -1rem -1rem 0;
    overflow: hidden;
    background:
      linear-gradient(rgba(28, 39, 52, 0.82), rgba(22, 30, 41, 0.9)),
      radial-gradient(circle at 50% 40%, rgba(15, 188, 175, 0.16), transparent 34%),
      #182232;
    color: #e5edf7;
    display: grid;
    grid-template-columns: 310px minmax(0, 1fr);
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .questbook-sidebar {
    min-width: 0;
    background:
      linear-gradient(rgba(10, 16, 22, 0.88), rgba(10, 16, 22, 0.94)),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 16px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 16px);
    border-right: 3px solid rgba(0, 0, 0, 0.55);
    display: flex;
    flex-direction: column;
    box-shadow: 16px 0 32px rgba(0,0,0,0.22);
    z-index: 4;
  }

  .questbook-titlebar {
    height: 58px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    border-bottom: 3px solid rgba(0,0,0,0.5);
    background: rgba(31, 41, 55, 0.72);
  }

  .questbook-book-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: linear-gradient(135deg, #8b5a2b, #2f2119);
    border: 2px solid rgba(255,255,255,0.25);
    display: grid;
    place-items: center;
    color: #f8d47a;
  }

  .questbook-sidebar-scroll { overflow: auto; padding: 8px 6px 18px; }
  .questbook-section-label { padding: 14px 10px 8px; font-size: 12px; letter-spacing: 0.16em; color: #94a3b8; text-transform: uppercase; font-weight: 900; }
  .questbook-chapter { width: 100%; min-height: 46px; display: grid; grid-template-columns: 34px minmax(0, 1fr); align-items: center; gap: 9px; padding: 6px 10px; color: #b8c4d2; border: 3px solid transparent; background: transparent; text-align: left; font-weight: 900; font-size: 18px; }
  .questbook-chapter:hover, .questbook-chapter.is-active { border-color: rgba(229, 231, 235, 0.78); background: rgba(255,255,255,0.16); color: #00d4d8; }
  .questbook-chapter-icon { width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.16); color: #f5c84b; }

  .questbook-progress {
    margin-top: auto;
    padding: 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: grid;
    gap: 10px;
  }

  .questbook-progress-bar {
    height: 10px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.14);
  }

  .questbook-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00e05a, #22d3ee);
  }

  .questbook-main { min-width: 0; position: relative; overflow: hidden; }
  .questbook-toolbar { position: absolute; left: 18px; top: 16px; right: 18px; z-index: 3; display: flex; justify-content: flex-end; gap: 12px; pointer-events: none; }
  .questbook-toolgroup { pointer-events: auto; display: flex; align-items: center; gap: 8px; padding: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(12, 18, 27, 0.76); box-shadow: 0 12px 32px rgba(0,0,0,0.28); backdrop-filter: blur(10px); }
  .questbook-icon-btn { width: 40px; height: 40px; display: inline-grid; place-items: center; background: rgba(255,255,255,0.1); color: #f8fafc; border: 1px solid rgba(255,255,255,0.16); font-weight: 900; text-decoration: none; }
  .questbook-primary-btn { height: 40px; padding: 0 14px; border: 1px solid rgba(34,211,238,0.45); background: rgba(6,182,212,0.22); color: #67e8f9; font-weight: 900; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }

  .questbook-viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
    cursor: grab;
    background:
      linear-gradient(rgba(20, 31, 44, 0.76), rgba(20, 31, 44, 0.76)),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0 1px, transparent 1px 16px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 16px);
  }

  .questbook-viewport.is-panning { cursor: grabbing; }
  .questbook-stage { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
  .questbook-edge-layer { position: absolute; inset: 0; overflow: visible; pointer-events: none; }

  .quest-node {
    position: absolute;
    width: var(--node-size, 58px);
    height: var(--node-size, 58px);
    border-radius: 999px;
    display: grid;
    place-items: center;
    cursor: pointer;
    background: radial-gradient(circle at 40% 34%, rgba(255,255,255,0.3), transparent 28%), linear-gradient(135deg, #5b626b, #2b3038);
    border: 2px solid rgba(255,255,255,0.55);
    box-shadow: 0 7px 16px rgba(0,0,0,0.34), inset 0 0 0 3px rgba(0,0,0,0.18);
    color: #f8fafc;
    font-weight: 900;
    user-select: none;
  }

  .quest-node.is-entry { border-color: #22d3ee; box-shadow: 0 0 0 3px rgba(34,211,238,0.24), 0 7px 16px rgba(0,0,0,0.34); }
  .quest-node.is-core { outline: 6px solid rgba(250, 204, 21, 0.24); }
  .quest-node.is-accepted { border-color: #00e05a; box-shadow: 0 0 0 4px rgba(0,224,90,0.2), 0 7px 16px rgba(0,0,0,0.34); }
  .quest-node.is-locked { opacity: .45; filter: grayscale(.8); }
  .quest-node-code { width: calc(var(--node-size, 58px) - 16px); height: calc(var(--node-size, 58px) - 16px); border-radius: 999px; display: grid; place-items: center; background: rgba(15, 23, 42, 0.58); font-size: 12px; line-height: 1; }
  .quest-node-check { position: absolute; right: -6px; top: -8px; color: #65ff00; font-size: 23px; text-shadow: 0 2px 0 rgba(0,0,0,0.45); }
  .quest-node-lock { position: absolute; right: -6px; top: -8px; color: #cbd5e1; font-size: 17px; text-shadow: 0 2px 0 rgba(0,0,0,0.45); }
  .quest-node-tooltip { position: absolute; left: 50%; top: -48px; transform: translateX(-50%); display: none; white-space: nowrap; padding: 7px 10px; border: 2px solid rgba(255,255,255,0.7); background: rgba(8, 12, 18, 0.9); color: #e5edf7; font-weight: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.34); }
  .quest-node:hover .quest-node-tooltip { display: block; }

  .quest-modal-backdrop { position: absolute; inset: 0; z-index: 8; background: rgba(2, 6, 12, 0.42); display: grid; place-items: center; padding: 24px; }
  .quest-modal { width: min(900px, 92vw); max-height: min(760px, 86vh); overflow: auto; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 16px), repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 16px), #202b38; border: 4px solid #101820; color: #dbe6f4; box-shadow: 0 24px 70px rgba(0,0,0,0.5); }
  .quest-modal-head { display: grid; grid-template-columns: 68px minmax(0, 1fr) auto; align-items: center; gap: 12px; min-height: 72px; border-bottom: 4px solid #101820; padding: 10px 16px; }
  .quest-modal-icon { width: 48px; height: 48px; border-radius: 10px; display: grid; place-items: center; background: linear-gradient(135deg, #5b626b, #252b33); border: 2px solid rgba(255,255,255,0.25); font-weight: 900; color: #67e8f9; }
  .quest-modal-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 4px solid #101820; }
  .quest-modal-cell { padding: 18px; min-height: 150px; }
  .quest-modal-cell + .quest-modal-cell { border-left: 4px solid #101820; }
  .quest-modal-title { color: #6d6aff; font-size: 22px; font-weight: 900; margin-bottom: 14px; text-align: center; }
  .quest-modal-title.reward { color: #f59e0b; }
  .quest-detail-list { display: grid; gap: 8px; color: #cbd5e1; font-weight: 700; }
  .quest-description { padding: 20px; font-size: 18px; line-height: 1.8; color: #f1f5f9; }
  .quest-small-muted { color: #94a3b8; font-size: 12px; font-weight: 800; }

  @media (max-width: 900px) {
    .questbook-app { grid-template-columns: 1fr; }
    .questbook-sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 300px; transform: translateX(-276px); transition: transform .18s ease; }
    .questbook-sidebar:hover { transform: translateX(0); }
    .questbook-toolbar { left: 38px; }
    .quest-modal-grid { grid-template-columns: 1fr; }
    .quest-modal-cell + .quest-modal-cell { border-left: 0; border-top: 4px solid #101820; }
  }
</style>
{% endblock %}

{% block content %}
<div id="training-detail-app"></div>
<script type="application/json" id="training-detail-payload">{{ payload|tojson }}</script>
{% endblock %}

{% block scripts %}
<script>
(() => {
  const app = document.getElementById('training-detail-app');
  const payload = JSON.parse(document.getElementById('training-detail-payload').textContent || '{}');
  const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
  let activeChapterId = payload.chapters[0]?.id || null;
  let openNodeId = null;
  let view = { x: 260, y: 120, scale: 1 };
  const activeChapter = () => (payload.chapters || []).find((chapter) => chapter.id === activeChapterId) || payload.chapters[0];
  const activeChapterNodes = () => activeChapter()?.nodes || [];
  const nodeMap = () => Object.fromEntries((payload.nodes || []).map((node) => [node.id, node]));
  const openNode = () => openNodeId ? nodeMap()[openNodeId] : null;
  const taskTitle = (task, node) => task?.title || node.label || node.problem.title;

  function problemInitials(problem) {
    const code = problem?.code || '';
    return code.replace(/^P/i, 'P').slice(0, 5) || '?';
  }

  function edgePath(from, to) {
    const x1 = from.x + 32;
    const y1 = from.y + 32;
    const x2 = to.x + 32;
    const y2 = to.y + 32;
    const dx = x2 - x1;
    const dy = y2 - y1;
    if (Math.abs(dx) > Math.abs(dy)) {
      const mid = Math.max(44, Math.abs(dx) / 2);
      return `M ${x1} ${y1} C ${x1 + Math.sign(dx || 1) * mid} ${y1}, ${x2 - Math.sign(dx || 1) * mid} ${y2}, ${x2} ${y2}`;
    }
    const mid = Math.max(44, Math.abs(dy) / 2);
    return `M ${x1} ${y1} C ${x1} ${y1 + Math.sign(dy || 1) * mid}, ${x2} ${y2 - Math.sign(dy || 1) * mid}, ${x2} ${y2}`;
  }

  function renderEdges() {
    const visible = new Set(activeChapterNodes().map((node) => node.id));
    const map = nodeMap();
    return (payload.edges || []).filter((edge) => visible.has(edge.fromNodeId) && visible.has(edge.toNodeId)).map((edge) => {
      const from = map[edge.fromNodeId];
      const to = map[edge.toNodeId];
      if (!from || !to) return '';
      const done = from.accepted;
      return `<path d="${edgePath(from, to)}" fill="none" stroke="${done ? '#00e05a' : '#9a7f86'}" stroke-width="7" stroke-opacity="0.58" stroke-linecap="round"></path>
        <path d="${edgePath(from, to)}" fill="none" stroke="${done ? '#00f060' : '#c8a5ab'}" stroke-width="2" stroke-opacity="0.74" stroke-dasharray="6 5"></path>`;
    }).join('');
  }

  function renderNodes() {
    return activeChapterNodes().map((node) => {
      const title = node.label || node.problem.title;
      const status = node.accepted ? 'is-accepted' : (node.locked ? 'is-locked' : '');
      const entry = node.isEntry ? 'is-entry' : '';
      const core = node.isCore ? 'is-core' : '';
      return `<button type="button" class="quest-node ${status} ${entry} ${core}" data-node="${node.id}" style="left:${node.x}px;top:${node.y}px;--node-size:64px;" title="${esc(title)}">
        <span class="quest-node-code">${esc(problemInitials(node.problem))}</span>
        ${node.accepted ? '<span class="quest-node-check">✓</span>' : ''}
        ${node.locked ? '<span class="quest-node-lock"><i class="fas fa-lock"></i></span>' : ''}
        <span class="quest-node-tooltip">${esc(title)}</span>
      </button>`;
    }).join('');
  }

  function renderModal() {
    const node = openNode();
    if (!node) return '';
    const map = nodeMap();
    const incoming = (payload.edges || []).filter((edge) => edge.toNodeId === node.id).map((edge) => map[edge.fromNodeId]).filter(Boolean);
    const outgoing = (payload.edges || []).filter((edge) => edge.fromNodeId === node.id).map((edge) => map[edge.toNodeId]).filter(Boolean);
    const tasks = (node.tasks && node.tasks.length) ? node.tasks : [{
      title: node.label || node.problem.title,
      description: '完成关联 OJ 题目',
      targetValue: 'accepted',
    }];
    const rewards = node.rewards || [];
    return `<div class="quest-modal-backdrop" data-close-modal>
      <div class="quest-modal" role="dialog" aria-modal="true" data-modal-card>
        <div class="quest-modal-head">
          <div class="quest-modal-icon">${esc(problemInitials(node.problem))}</div>
          <div>
            <div class="quest-small-muted">${esc(node.problem.code)} · ${esc(node.problem.difficulty || 'medium')}</div>
            <h2 class="text-2xl font-black text-stone-100">${esc(node.label || node.problem.title)}</h2>
          </div>
          <div class="flex gap-2">
            ${!node.locked ? `<a class="questbook-primary-btn" href="${node.problem.url}"><i class="fas fa-play"></i> 去做题</a>` : ''}
            <button type="button" class="questbook-icon-btn" data-close-modal-btn><i class="fas fa-xmark"></i></button>
          </div>
        </div>
        <div class="quest-modal-grid">
          <div class="quest-modal-cell">
            <div class="quest-modal-title">目标</div>
            <div class="quest-detail-list">
              ${tasks.map((task, index) => `<div>
                <strong>${index + 1}. ${esc(taskTitle(task, node))}</strong>
                <div class="quest-small-muted">${esc(task.description || '完成关联 OJ 题目')} · ${esc(task.targetValue || 'accepted')}</div>
              </div>`).join('')}
              <div>状态：${node.accepted ? '已完成' : (node.locked ? '未解锁' : '可挑战')}</div>
              <div>前置要求：${incoming.length ? '完成全部前置节点' : '无'}</div>
            </div>
          </div>
          <div class="quest-modal-cell">
            <div class="quest-modal-title reward">解锁</div>
            <div class="quest-detail-list">
              ${outgoing.length ? outgoing.map((item) => `<div>${esc(item.problem.code)} · ${esc(item.label || item.problem.title)}</div>`).join('') : '<div class="quest-small-muted">没有后续节点</div>'}
              ${rewards.length ? `<div class="mt-3"><strong>奖励</strong></div>${rewards.map((reward) => `<div>${esc(reward.title || '解锁后续节点')}<div class="quest-small-muted">${esc(reward.description || '自动发放')}</div></div>`).join('')}` : ''}
            </div>
          </div>
        </div>
        <div class="quest-description">
          ${node.note ? esc(node.note).replace(/\n/g, '<br>') : '完成这个节点后，相关后续训练会自动解锁。'}
        </div>
      </div>
    </div>`;
  }

  function render() {
    const chapter = activeChapter();
    const percent = payload.stats.nodeCount ? Math.round((payload.stats.acceptedCount / payload.stats.nodeCount) * 100) : 0;
    app.innerHTML = `
      <div class="questbook-app">
        <aside class="questbook-sidebar">
          <div class="questbook-titlebar">
            <div class="questbook-book-icon"><i class="fas fa-book"></i></div>
            <div class="min-w-0">
              <div class="font-black truncate">${esc(payload.project.title)}</div>
              <div class="quest-small-muted">${payload.stats.chapterCount} 章 · ${payload.stats.nodeCount} 节点</div>
            </div>
          </div>
          <div class="questbook-sidebar-scroll">
            <div class="questbook-section-label">Chapters</div>
            ${(payload.chapters || []).map((item, index) => `<button type="button" class="questbook-chapter ${item.id === activeChapterId ? 'is-active' : ''}" data-chapter="${item.id}">
              <span class="questbook-chapter-icon"><i class="fas fa-${index === 0 ? 'seedling' : 'diagram-project'}"></i></span>
              <span class="truncate">${esc(item.title)}</span>
            </button>`).join('')}
          </div>
          <div class="questbook-progress">
            <div class="flex justify-between text-sm font-black"><span>进度</span><span>${payload.stats.acceptedCount}/${payload.stats.nodeCount}</span></div>
            <div class="questbook-progress-bar"><div class="questbook-progress-fill" style="width:${percent}%"></div></div>
            <a href="/oj/trainings" class="questbook-primary-btn justify-center"><i class="fas fa-arrow-left"></i> 训练列表</a>
          </div>
        </aside>
        <main class="questbook-main">
          <div class="questbook-toolbar">
            <div class="questbook-toolgroup">
              <button type="button" class="questbook-icon-btn" id="zoom-out"><i class="fas fa-minus"></i></button>
              <button type="button" class="questbook-icon-btn" id="zoom-reset">${Math.round(view.scale * 100)}%</button>
              <button type="button" class="questbook-icon-btn" id="zoom-in"><i class="fas fa-plus"></i></button>
              ${payload.project.urls.designer ? `<a class="questbook-primary-btn" href="${payload.project.urls.designer}"><i class="fas fa-pen"></i> 设计器</a>` : ''}
            </div>
          </div>
          <div class="questbook-viewport" id="quest-viewport">
            <div class="questbook-stage" id="quest-stage" style="width:${chapter?.canvasWidth || 2200}px;height:${chapter?.canvasHeight || 1400}px;transform:translate(${view.x}px, ${view.y}px) scale(${view.scale});">
              <svg class="questbook-edge-layer" width="${chapter?.canvasWidth || 2200}" height="${chapter?.canvasHeight || 1400}">
                ${renderEdges()}
              </svg>
              ${renderNodes()}
            </div>
          </div>
          ${renderModal()}
        </main>
      </div>`;
    bindEvents();
  }

  function zoomBy(multiplier, origin = null) {
    const oldScale = view.scale;
    const nextScale = Math.min(2.4, Math.max(0.32, oldScale * multiplier));
    if (origin) {
      const worldX = (origin.x - view.x) / oldScale;
      const worldY = (origin.y - view.y) / oldScale;
      view.x = origin.x - worldX * nextScale;
      view.y = origin.y - worldY * nextScale;
    }
    view.scale = nextScale;
    render();
  }

  function bindEvents() {
    app.querySelector('#zoom-in')?.addEventListener('click', () => zoomBy(1.16));
    app.querySelector('#zoom-out')?.addEventListener('click', () => zoomBy(0.86));
    app.querySelector('#zoom-reset')?.addEventListener('click', () => {
      view = { x: 260, y: 120, scale: 1 };
      render();
    });
    app.querySelectorAll('[data-chapter]').forEach((button) => button.addEventListener('click', () => {
      activeChapterId = Number(button.dataset.chapter);
      openNodeId = null;
      render();
    }));
    app.querySelectorAll('[data-node]').forEach((button) => button.addEventListener('click', () => {
      openNodeId = Number(button.dataset.node);
      render();
    }));
    app.querySelector('[data-close-modal]')?.addEventListener('click', () => {
      openNodeId = null;
      render();
    });
    app.querySelector('[data-modal-card]')?.addEventListener('click', (event) => event.stopPropagation());
    app.querySelector('[data-close-modal-btn]')?.addEventListener('click', () => {
      openNodeId = null;
      render();
    });
    bindPanZoom();
  }

  function bindPanZoom() {
    const viewport = app.querySelector('#quest-viewport');
    if (!viewport) return;
    viewport.addEventListener('wheel', (event) => {
      event.preventDefault();
      const rect = viewport.getBoundingClientRect();
      zoomBy(event.deltaY < 0 ? 1.08 : 0.92, { x: event.clientX - rect.left, y: event.clientY - rect.top });
    }, { passive: false });
    viewport.addEventListener('pointerdown', (event) => {
      if (event.target.closest('.quest-node') || event.target.closest('.questbook-toolbar') || event.target.closest('.quest-modal')) return;
      const startX = event.clientX;
      const startY = event.clientY;
      const originX = view.x;
      const originY = view.y;
      viewport.classList.add('is-panning');
      viewport.setPointerCapture(event.pointerId);
      const onMove = (moveEvent) => {
        view.x = originX + moveEvent.clientX - startX;
        view.y = originY + moveEvent.clientY - startY;
        const stage = app.querySelector('#quest-stage');
        if (stage) stage.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
      };
      const onUp = () => {
        viewport.classList.remove('is-panning');
        viewport.removeEventListener('pointermove', onMove);
        viewport.removeEventListener('pointerup', onUp);
      };
      viewport.addEventListener('pointermove', onMove);
      viewport.addEventListener('pointerup', onUp);
    });
  }

  render();
})();
</script>
{% endblock %}

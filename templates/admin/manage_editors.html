{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto card bg-base-100 shadow">
  <div class="card-body">
    <h2 class="card-title">编辑授权 - {{ wiki.title }}</h2>
    <form method="post" class="flex items-center gap-2 mb-4">
      <input class="input input-bordered" name="username" placeholder="用户名">
      <button class="btn btn-primary" type="submit">添加编辑者</button>
    </form>
    <h3 class="font-semibold mb-2">当前编辑者</h3>
    <ul class="menu">
      {% for name in editors %}
      <li>{{ name }}</li>
      {% else %}
      <li class="text-base-content/70">暂无编辑者</li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock %}

services:
  wikibook-allinone:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5009}
      HOST: 0.0.0.0
      POSTGRES_DB: ${POSTGRES_DB:-wikibook}
      POSTGRES_USER: ${POSTGRES_USER:-wikibook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikibook}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://wikibook:wikibook@127.0.0.1:5432/wikibook}
      REDIS_URL: ${REDIS_URL:-redis://127.0.0.1:6379/0}
      JUDGE_RUNTIME_IMAGE: ${JUDGE_RUNTIME_IMAGE:-wikibook-judge-runtime:latest}
    ports:
      - "${PORT:-5009}:${PORT:-5009}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - redis_data:/var/lib/redis
      - uploads_data:/app/static/uploads
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
  uploads_data:

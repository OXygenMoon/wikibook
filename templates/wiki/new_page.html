{% extends "base.html" %}

{% block title %}新建页面 - {{ wiki.title }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/github.min.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/easymde.min.css') }}">

<style>
    /* =========================================
       1. EasyMDE 容器主样式 (核心修复)
       ========================================= */
    .EasyMDEContainer {
        display: flex;
        flex-direction: column;
        background: white;
        border: 1px solid hsl(var(--bc) / 0.1);
        border-radius: 1rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        /* 改进：不写死 600px，改用视口高度百分比，更具弹性 */
        min-height: 65vh; 
        transition: border-color 0.3s ease;
    }
    
    /* 容器获取焦点时的光晕 */
    .EasyMDEContainer:focus-within {
        border-color: var(--theme-primary);
        box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1); /* 假设 primary 是橙色 */
    }

    /* 当编辑器进入【全屏模式】时 */
    .EasyMDEContainer.fullscreen {
        height: 100vh !important; 
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        z-index: 999999 !important; 
        border-radius: 0 !important;
        background: hsl(var(--b1)) !important; /* 防止透明露底 */
    }

    /* =========================================
       2. 工具栏样式
       ========================================= */
    .editor-toolbar {
        flex-shrink: 0; 
        border: none !important;
        border-bottom: 1px solid hsl(var(--bc) / 0.05) !important;
        background-color: hsl(var(--b2) / 0.3);
        border-radius: 1rem 1rem 0 0;
        padding: 0.5rem 1rem !important;
        
        /* 强制单行显示，支持横向滚动 */
        white-space: nowrap;
        overflow-x: auto;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    
    /* 工具栏按钮悬浮优化 */
    .editor-toolbar button {
        border-radius: 0.5rem !important;
        color: hsl(var(--bc) / 0.7) !important;
        transition: all 0.2s;
    }
    .editor-toolbar button:hover, .editor-toolbar button.active {
        background-color: hsl(var(--bc) / 0.1) !important;
        color: var(--theme-primary) !important;
    }
    
    .EasyMDEContainer.fullscreen .editor-toolbar {
        border-radius: 0;
    }

    .editor-toolbar::-webkit-scrollbar { height: 0; }

    /* =========================================
       3. 编辑区 (CodeMirror) 样式
       ========================================= */
    .CodeMirror {
        flex-grow: 1; 
        height: auto !important; 
        border: none !important;
        border-radius: 0 0 1rem 1rem;
        font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Courier New', monospace;
        font-size: 15px;
        line-height: 1.7;
        background: transparent;
        padding: 1rem;
    }
    
    .CodeMirror-scroll {
        min-height: 100% !important;
    }

    /* =========================================
       4. 分屏预览区 (Side by Side) 样式
       ========================================= */
    .editor-preview-side {
        border: none !important;
        border-left: 1px solid hsl(var(--bc) / 0.1) !important;
        background-color: hsl(var(--b1)); /* 和主题底色一致 */
        position: absolute;
        bottom: 0;
        right: 0;
        top: 50px; 
        height: auto !important; 
        z-index: 50;
        padding: 2rem !important; /* 增加内边距更易读 */
    }

    .EasyMDEContainer.sided--no-fullscreen .CodeMirror {
        width: 50% !important;
    }
    
    .EasyMDEContainer.sided--no-fullscreen .editor-preview-side {
        width: 50% !important;
        top: 52px !important; /* 修正顶部距离，对应工具栏高度 */
        display: block !important;
    }

    .editor-preview-side p { margin: 0.5em 0; }

    /* =========================================
       5. 强行拍平左侧源码区的富文本效果，还原纯代码视觉
       ========================================= */
    .EasyMDEContainer .CodeMirror .cm-header-1,
    .EasyMDEContainer .CodeMirror .cm-header-2,
    .EasyMDEContainer .CodeMirror .cm-header-3,
    .EasyMDEContainer .CodeMirror .cm-header-4,
    .EasyMDEContainer .CodeMirror .cm-header-5,
    .EasyMDEContainer .CodeMirror .cm-header-6 {
        font-size: 1em !important; 
        font-weight: normal !important;
        line-height: inherit !important;
    }

    .EasyMDEContainer .CodeMirror .cm-formatting-strong,
    .EasyMDEContainer .CodeMirror .cm-strong {
        font-weight: normal !important;
    }

    .EasyMDEContainer .CodeMirror .cm-formatting-em,
    .EasyMDEContainer .CodeMirror .cm-em {
        font-style: normal !important;
    }
</style>
{% endblock %}

{% block sidebar_menu %}
    {% include "wiki/sidebar.html" ignore missing %}
{% endblock %}

{% block content %}
<div class="w-full max-w-[98%] 2xl:max-w-7xl mx-auto flex flex-col gap-6 pb-12">
    
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mt-2 mb-2">
        <div class="flex items-center gap-3">
            <div class="w-1.5 h-6 bg-primary rounded-full"></div>
            <h1 class="text-2xl md:text-3xl font-black text-stone-800 dark:text-stone-100 tracking-tight">新建页面</h1>
        </div>
        <a href="{{ url_for('wiki_detail', wiki_id=wiki.id) }}" class="btn btn-ghost bg-base-200/50 hover:bg-base-200 border-none rounded-xl gap-2 font-medium self-start sm:self-auto">
            <i class="fas fa-arrow-left text-base-content/50"></i> 返回 Wiki
        </a>
    </div>

    <div class="card bg-white/80 dark:bg-base-100/80 backdrop-blur-xl shadow-xl shadow-stone-200/40 dark:shadow-none border border-black/5 dark:border-white/5 rounded-[2rem] overflow-hidden">
        <div class="card-body p-6 lg:p-10">
            <form method="post" class="flex flex-col gap-6">
                
                <div class="flex flex-col md:flex-row gap-5">
                    <div class="form-control flex-1">
                        <label class="label hidden md:flex pb-1"><span class="label-text font-bold text-xs uppercase tracking-wider text-base-content/50">页面标题</span></label>
                        <input class="input input-lg input-bordered w-full focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl font-bold text-xl tracking-tight shadow-sm" name="title" placeholder="在此输入页面标题..." required>
                    </div>
                    <div class="form-control w-full md:w-32">
                        <label class="label hidden md:flex pb-1"><span class="label-text font-bold text-xs uppercase tracking-wider text-base-content/50">排序序号</span></label>
                        <input class="input input-lg input-bordered w-full text-center font-mono focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl shadow-sm" name="slug" type="number" step="1" placeholder="ID" title="数字越小，在目录中越靠前" required>
                    </div>
                </div>
                
                <div class="form-control relative">
                    <i class="fas fa-tags absolute left-4 top-1/2 -translate-y-1/2 text-base-content/30"></i>
                    <input class="input input-bordered w-full pl-10 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl shadow-sm text-sm" name="tags" placeholder="添加标签 (例如：算法, 读书笔记)，多个标签用逗号分隔">
                </div>

                <div class="form-control mt-2">
                    <textarea id="md-editor" name="content_md"></textarea>
                </div>

                <div class="flex justify-end pt-6 border-t border-base-200 mt-2">
                    <button class="btn btn-primary btn-lg rounded-full px-10 shadow-lg shadow-primary/30 hover:-translate-y-1 transition-all gap-2 text-white font-bold" type="submit">
                        <i class="fas fa-paper-plane"></i>
                        发布页面
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/vendor/polyfill.min.js') }}"></script>
<script id="MathJax-script" async src="{{ url_for('static', filename='js/vendor/tex-mml-chtml.js') }}"></script>
<script src="{{ url_for('static', filename='js/vendor/highlight.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/vendor/easymde.min.js') }}"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
      hljs.highlightAll();
  });

  const easyMDE = new EasyMDE({
    element: document.getElementById('md-editor'),
    
    // 允许分屏
    sideBySideFullscreen: false, 
    syncSideBySidePreviewScroll: true,
    autosave: {
            enabled: true,
            uniqueId: "new_wiki_page_draft", // 必须唯一！
            delay: 1000,
        },
    toolbar: [
        "bold", "italic", "strikethrough", "heading", "|", 
        "quote", "unordered-list", "ordered-list", "|", 
        "link", "image", "upload-image", "code", "|",  
        "preview", "side-by-side", "fullscreen", "|", 
        "guide"
    ],

    uploadImage: true,
    imageUploadEndpoint: "{{ url_for('upload_file') }}",
    imagePathAbsolute: true,
    imageCSRFToken: "", 
    imageMaxSize: 1024 * 1024 * 16,
    imageAccept: "image/png, image/jpeg, image/gif, image/webp",
    imageTexts: {
        sbInit: "在此拖拽或点击上传图片",
        sbOnDragEnter: "松开鼠标即可上传",
        sbOnDragLeave: "取消上传",
        sbProgress: "正在努力上传中...",
        sbOnUploaded: "上传成功！",
        sizeUnits: "b,kb,mb"
    },
    errorCallback: (msg) => {
        if(window.app && window.app.toast) {
            app.toast.show("上传失败: " + msg, "error");
        } else {
            alert("上传失败: " + msg);
        }
    },

    // 💡 修复 1: 正确使用内置解析器并处理代码高亮与公式
    previewRender: function(plainText, preview) {
        setTimeout(() => {
            if (window.hljs) preview.querySelectorAll('pre code').forEach((b) => hljs.highlightElement(b));
            if (typeof MathJax !== 'undefined') MathJax.typesetPromise([preview]);
        }, 0);
        return this.parent.markdown(plainText); 
    },
  });

// 页面加载后自动开启分屏
  setTimeout(function() {
      if (!easyMDE.isSideBySideActive() && window.innerWidth > 1024) { // 仅在大屏幕上自动开启分屏
          easyMDE.toggleSideBySide();
      }
      if(easyMDE.codemirror) easyMDE.codemirror.refresh();

      // 💡 修复 2: 为侧边预览框注入全局的 Markdown 排版样式
      const previewElement = document.querySelector('.editor-preview-side');
      if (previewElement) {
          previewElement.classList.add('markdown-body', 'prose', 'prose-stone', 'max-w-none', 'p-6');
      }
  }, 300);

</script>
{% endblock %}

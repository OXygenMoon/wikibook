{% extends "base.html" %}

{% block title %}作业下发中心{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/easymde.min.css') }}">
<style>
    .EasyMDEContainer { background: white; border-radius: 1rem; overflow: hidden; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto py-10 px-4">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-1.5 h-8 bg-amber-600 rounded-full"></div>
        <div>
            <h2 class="text-3xl font-black text-stone-800">设计与分发委托</h2>
            <p class="text-stone-500 font-bold text-sm uppercase tracking-widest mt-1">Quest Distribution Center</p>
        </div>
    </div>

    <div class="card bg-base-100 shadow-xl shadow-stone-200/50 border border-stone-200 mb-10 overflow-hidden">
        <div class="p-6 bg-stone-50 border-b border-stone-200">
            <h3 class="font-black text-lg text-stone-700 flex items-center gap-2"><i class="fas fa-pen-nib text-amber-600"></i> 起草新委托</h3>
        </div>
        <div class="card-body">
            <form method="post" class="flex flex-col gap-5">
                <div class="form-control">
                    <label class="label font-bold text-stone-600">委托标题</label>
                    <input type="text" name="title" class="input input-bordered focus:border-amber-500 font-bold text-lg" placeholder="例如：完成《Python基础》第一章练习" required>
                </div>

                <div class="form-control">
    <label class="label font-bold text-stone-600">任务难度 / 悬赏星级</label>
    <div class="rating rating-md gap-2 bg-stone-50 p-3 rounded-xl border border-stone-200 w-fit">
        <input type="radio" name="star_level" value="1" class="mask mask-star-2 bg-amber-400" checked />
        <input type="radio" name="star_level" value="2" class="mask mask-star-2 bg-amber-400" />
        <input type="radio" name="star_level" value="3" class="mask mask-star-2 bg-amber-400" />
        <input type="radio" name="star_level" value="4" class="mask mask-star-2 bg-amber-400" />
        <input type="radio" name="star_level" value="5" class="mask mask-star-2 bg-amber-400" />
    </div>
</div>
                
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-2 border-amber-500/20 p-4 rounded-2xl bg-amber-50/30">
                    <div class="form-control">
                        <label class="label font-bold text-stone-600">发送对象 (Target)</label>
                        <select id="target_type_select" name="target_type" class="select select-bordered border-2 focus:border-amber-500 w-full font-bold text-stone-600" onchange="toggleTargetValue()">
                            <option value="all" selected>🌐 全员发布 (所有人可见)</option>
                            <option value="class">🏫 指定班级</option>
                            <option value="group">👥 指定小组</option>
                            <option value="personal">👤 指定个人</option>
                        </select>
                    </div>
                    
                    <div class="form-control">
                        <label class="label font-bold text-stone-600">
                            指定对象范围 <span id="target_hint" class="text-stone-400 font-normal text-xs ml-2">(已选全员，无需指定)</span>
                        </label>
                        
                        <input type="text" id="target_all" class="input input-bordered bg-stone-100 text-stone-400 cursor-not-allowed" value="全系统生效" disabled>
                        
                        <select id="target_class" class="select select-bordered border-2 focus:border-amber-500 w-full hidden">
                            <option value="" disabled selected>请选择班级...</option>
                            {% for c in classes %}
                                <option value="{{ c }}">{{ c }}</option>
                            {% else %}
                                <option value="" disabled>系统暂无班级记录，请手动输入或去人员管理添加</option>
                            {% endfor %}
                        </select>

                        <select id="target_group" class="select select-bordered border-2 focus:border-amber-500 w-full hidden">
                            <option value="" disabled selected>请选择小组...</option>
                            {% for g in groups %}
                                <option value="{{ g }}">{{ g }}</option>
                            {% else %}
                                <option value="" disabled>系统暂无小组记录</option>
                            {% endfor %}
                        </select>

                        <select id="target_personal" class="select select-bordered border-2 focus:border-amber-500 w-full hidden">
                            <option value="" disabled selected>请选择学生...</option>
                            {% for u in all_users %}
                                <option value="{{ u.id }}">{{ u.username }} (ID: {{ u.id }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-control">
                    <label class="label font-bold text-stone-600">截止日期 (可选)</label>
                    <input type="datetime-local" name="deadline" class="input input-bordered focus:border-amber-500 w-full md:w-1/3">
                </div>

                <div class="form-control mt-2">
                    <label class="label font-bold text-stone-600">任务要求 / 描述</label>
                    <textarea id="md-editor" name="content_md" class="hidden"></textarea>
                </div>

                <button type="submit" class="btn bg-amber-600 hover:bg-amber-700 text-white border-none mt-4 h-12 text-lg shadow-lg shadow-amber-600/30">
                    <i class="fas fa-paper-plane mr-1"></i> 把委托钉在告示板上
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/vendor/easymde.min.js') }}"></script>
<script>

    function toggleTargetValue() {
        const type = document.getElementById('target_type_select').value;
        const hint = document.getElementById('target_hint');
        
        // 拿到所有可能的输入框
        const inputs = {
            'all': document.getElementById('target_all'),
            'class': document.getElementById('target_class'),
            'group': document.getElementById('target_group'),
            'personal': document.getElementById('target_personal')
        };

        // 遍历处理：匹配的显示并赋予name属性，不匹配的隐藏并剥夺name属性
        for (let key in inputs) {
            if (key === type) {
                inputs[key].classList.remove('hidden');
                if(key !== 'all') inputs[key].setAttribute('name', 'target_value');
            } else {
                inputs[key].classList.add('hidden');
                inputs[key].removeAttribute('name');
            }
        }

        // 修改提示文字
        if(type === 'all') hint.innerText = '(已选全员，无需指定)';
        else if(type === 'class') hint.innerText = '(请在下拉列表中选择班级)';
        else if(type === 'group') hint.innerText = '(请在下拉列表中选择小组)';
        else if(type === 'personal') hint.innerText = '(请在下拉列表中选择具体用户)';
    }

    document.addEventListener('DOMContentLoaded', () => {
        const easyMDE = new EasyMDE({
            element: document.getElementById('md-editor'),
            spellChecker: false,
            status: false,
            minHeight: "250px",
            placeholder: "在这里详细描述这项委托的具体要求、需要阅读的资料等..."
        });
    });
</script>
{% endblock %}

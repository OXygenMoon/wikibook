{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto card bg-base-100 shadow">
  <div class="card-body">
    <h2 class="card-title">创建Wiki</h2>
    <form method="post" class="flex flex-col gap-4">
      <input class="input input-bordered" name="title" placeholder="标题">
      <textarea class="textarea textarea-bordered min-h-40" name="description" placeholder="描述"></textarea>
      <button class="btn btn-primary" type="submit">创建</button>
    </form>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}编辑徽章{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-base-content tracking-tight">编辑徽章</h1>
        <a href="{{ url_for('manage_badges') }}" class="btn btn-ghost">返回列表</a>
    </div>

    <div class="card bg-base-100 shadow-xl border border-base-200">
        <div class="card-body">
            <form method="post" class="flex flex-col gap-4">
                <div class="form-control">
                    <label class="label"><span class="label-text">徽章名称</span></label>
                    <input type="text" name="name" class="input input-bordered" value="{{ badge.name }}" required />
                </div>
                
                <div class="form-control">
                    <label class="label"><span class="label-text">图标 (Emoji)</span></label>
                    <input type="text" name="icon" class="input input-bordered" value="{{ badge.icon }}" required />
                </div>
                
                <div class="form-control">
                    <label class="label"><span class="label-text">描述</span></label>
                    <textarea name="description" class="textarea textarea-bordered">{{ badge.description }}</textarea>
                </div>
                
                <div class="form-control">
                    <label class="label"><span class="label-text">触发条件类型</span></label>
                    <select name="condition_type" class="select select-bordered" required>
                        <option value="streak_days" {% if badge.condition_type == 'streak_days' %}selected{% endif %}>连续打卡天数</option>
                        <option value="study_hours" {% if badge.condition_type == 'study_hours' %}selected{% endif %}>累计学习小时数</option>
                        <option value="note_count" {% if badge.condition_type == 'note_count' %}selected{% endif %}>累计笔记数量</option>
                        <option value="featured_count" {% if badge.condition_type == 'featured_count' %}selected{% endif %}>累计精选笔记数量</option>
                        <option value="wiki_edit_count" {% if badge.condition_type == 'wiki_edit_count' %}selected{% endif %}>Wiki 编辑次数 (百科贡献者)</option>
                        <option value="wiki_create_count" {% if badge.condition_type == 'wiki_create_count' %}selected{% endif %}>Wiki 创建次数 (博学家)</option>
                        <option value="comment_count" {% if badge.condition_type == 'comment_count' %}selected{% endif %}>评论发布数量 (社区活跃)</option>
                        <option value="night_owl_sessions" {% if badge.condition_type == 'night_owl_sessions' %}selected{% endif %}>深夜学习天数 (23:00-04:00)</option>
                        <option value="early_bird" {% if badge.condition_type == 'early_bird' %}selected{% endif %}>早起鸟 (05:00-08:00)</option>
                        <option value="weekend_warrior" {% if badge.condition_type == 'weekend_warrior' %}selected{% endif %}>周末卷王 (周六日累计小时)</option>
                        <option value="long_session_count" {% if badge.condition_type == 'long_session_count' %}selected{% endif %}>深度专注次数 (单次>2小时)</option>
                        <option value="share_count" {% if badge.condition_type == 'share_count' %}selected{% endif %}>分享笔记次数 (乐于分享)</option>
                        <option value="total_views_received" {% if badge.condition_type == 'total_views_received' %}selected{% endif %}>笔记被阅读次数 (影响力)</option>
                    </select>
                </div>
                
                <div class="form-control">
                    <label class="label"><span class="label-text">条件阈值</span></label>
                    <input type="number" name="condition_value" class="input input-bordered" value="{{ badge.condition_value }}" required />
                </div>
                
                <div class="form-control">
                    <label class="label cursor-pointer justify-start gap-2">
                        <input type="checkbox" name="is_hidden" class="checkbox" {% if badge.is_hidden %}checked{% endif %} />
                        <span class="label-text">隐藏成就 (未获得时不显示条件)</span>
                    </label>
                </div>
                
                <div class="alert alert-info shadow-sm mt-4">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>保存后，系统将重新检查所有用户是否满足新的条件，并自动补发徽章。</span>
                </div>
                
                <div class="form-control mt-4">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
